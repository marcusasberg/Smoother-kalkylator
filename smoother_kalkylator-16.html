<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; min-height: 100vh; padding: 24px 16px; color: #111827; }
:root { --g:#2d7a4f; --gl:#e8f5ee; --gb:#d1fae5; --r:#dc2626; --rl:#fef2f2; --b:#1d4ed8; --bl:#eff6ff; --gray:#6b7280; --dark:#111827; }
.wrap { max-width: 860px; margin: 0 auto; }
.card { background: white; border-radius: 14px; padding: 20px; border: 1px solid var(--gb); margin-bottom: 16px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
h1 { font-size: 26px; font-weight: 800; line-height: 1.2; }
h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
.sub { font-size: 12px; color: var(--gray); margin-bottom: 16px; }

/* Slider + input combo */
.sl { margin-bottom: 18px; }
.sl-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
.sl-lbl { font-size: 13px; color: var(--gray); font-weight: 500; flex: 1; }
.sl-input { width: 90px; font-size: 13px; font-weight: 700; color: var(--g); background: var(--gl); border: 1px solid var(--gb); border-radius: 7px; padding: 3px 8px; text-align: right; font-family: inherit; outline: none; transition: border-color .15s; -moz-appearance: textfield; }
.sl-input::-webkit-inner-spin-button, .sl-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.sl-input:focus { border-color: var(--g); background: white; }
.sl-mm { display: flex; justify-content: space-between; margin-top: 3px; font-size: 11px; color: #9ca3af; }
input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:var(--gb); cursor:pointer; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--g); cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.2); }
input[type=range]::-moz-range-thumb { width:18px; height:18px; border-radius:50%; background:var(--g); cursor:pointer; border:none; }

/* KPI */
.kpi { border-radius: 12px; padding: 14px 16px; flex: 1; min-width: 110px; border: 1px solid var(--gb); background: white; }
.kpi.hl { background: var(--g); border-color: var(--g); }
.kpi.hlr { background: var(--r); border-color: var(--r); }
.kpi-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; color: var(--gray); }
.kpi.hl .kpi-lbl, .kpi.hlr .kpi-lbl { color: rgba(255,255,255,.75); }
.kpi-val { font-size: 20px; font-weight: 800; line-height: 1; color: var(--dark); }
.kpi.hl .kpi-val, .kpi.hlr .kpi-val { color: white; }
.kpi-sub { font-size: 11px; color: #9ca3af; margin-top: 4px; }
.kpi.hl .kpi-sub, .kpi.hlr .kpi-sub { color: rgba(255,255,255,.7); }

/* Model cards */
.mcards { display: flex; gap: 10px; flex-wrap: wrap; }
.mc { flex:1; min-width:140px; background:white; border:2px solid #e5e7eb; border-radius:10px; padding:10px 12px; cursor:pointer; text-align:left; }
.mc.sel { background:var(--gl); border-color:var(--g); }
.mc-t { font-size:12px; font-weight:700; color:var(--dark); margin-bottom:3px; }
.mc.sel .mc-t { color:var(--g); }
.mc-d { font-size:11px; color:var(--gray); line-height:1.4; }

/* PL */
.plr { display:flex; justify-content:space-between; align-items:center; padding:4px 0; }
.plr.ind { padding-left:16px; }
.pl-l { font-size:13px; color:var(--gray); }
.plr.bold .pl-l { color:var(--dark); font-weight:700; }
.pl-v { font-size:13px; font-weight:500; color:var(--dark); }
.plr.bold .pl-v { font-weight:700; }
.plr.pos .pl-v { color:var(--g); }
.plr.neg .pl-v { color:var(--r); }
.pl-sep { border-top:1px solid var(--gb); margin:6px 0; }

/* Result box */
.rbox { border-radius:12px; padding:16px; text-align:center; }
.rbox-lbl { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
.rbox-val { font-size:28px; font-weight:800; }
.rbox-sub { font-size:12px; margin-top:6px; opacity:.8; }

/* Extra posts */
.ep { display:flex; justify-content:space-between; align-items:center; background:#f9fafb; border-radius:8px; padding:8px 12px; margin-bottom:6px; }
.ep-nm { font-size:13px; }
.ep-amt { font-size:13px; font-weight:600; color:var(--r); }
.ep-rm { background:none; border:none; cursor:pointer; color:#9ca3af; font-size:20px; line-height:1; padding:0 4px; }
.add-row { display:flex; gap:8px; margin-top:8px; }
.add-row input { border:1px solid var(--gb); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; outline:none; }
.add-row input:focus { border-color:var(--g); }
.add-row .ni { flex:2; } .add-row .ai { flex:1; }
.add-btn { background:var(--g); color:white; border:none; border-radius:8px; padding:8px 16px; font-size:14px; font-weight:700; cursor:pointer; }

/* Info boxes */
.ibox { background:#f9fafb; border-radius:8px; padding:10px 14px; font-size:12px; color:var(--gray); margin-top:14px; }
.gbox { background:var(--gl); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--g); font-weight:500; margin-top:12px; }
.scol-t { font-size:12px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }

/* Scale */
.scards { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
.sc { flex:1; min-width:140px; border-radius:10px; padding:14px 16px; }
.sc-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.sc-val { font-size:20px; font-weight:800; }
.sc-sub { font-size:11px; margin-top:4px; opacity:.8; }
.sc-g { background:var(--gl); color:var(--g); }
.sc-r { background:var(--rl); border:1px solid #fecaca; color:var(--r); }
.sc-b { background:var(--bl); border:1px solid #bfdbfe; color:var(--b); }
.chart-bars { display:flex; align-items:flex-end; gap:2px; height:200px; padding:0 4px; }
.bgrp { display:flex; gap:1px; align-items:flex-end; flex:1; }
.bar { border-radius:3px 3px 0 0; min-width:4px; }
.chart-legend { display:flex; gap:16px; justify-content:center; margin-top:10px; }
.leg { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--gray); }
.leg-dot { width:12px; height:12px; border-radius:2px; }
.chart-x { display:flex; justify-content:space-between; padding:4px 4px 0; font-size:10px; color:#9ca3af; }
.scale-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
select { font-size:12px; padding:4px 8px; border-radius:6px; border:1px solid var(--gb); color:var(--dark); background:white; font-family:inherit; cursor:pointer; }
.insight { background:var(--g); border-radius:14px; padding:18px 20px; color:white; }
.ins-t { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; opacity:.8; }
.ins-b { font-size:14px; line-height:1.7; }
.ins-obs { margin-top:12px; padding:10px 14px; background:rgba(255,255,255,.15); border-radius:8px; font-size:13px; font-weight:600; }
.flex{display:flex;} .fcol{display:flex;flex-direction:column;}
.gap8{gap:8px;} .gap10{gap:10px;} .gap12{gap:12px;} .gap16{gap:16px;} .gap24{gap:24px;}
@media(max-width:600px){ .grid2{grid-template-columns:1fr;} }

/* Login screen */
#login-screen {
  position: fixed; inset: 0;
  background: #f9fafb;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-box {
  background: white;
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 360px;
  border: 1px solid #d1fae5;
  text-align: center;
}
.login-logo { margin-bottom: 28px; }
.login-logo img { height: 44px; width: auto; }
.login-title { font-size: 15px; font-weight: 600; color: #6b7280; margin-bottom: 28px; letter-spacing: 0.02em; }
.login-field {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #d1fae5;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  margin-bottom: 12px;
  color: #111827;
  background: #f9fafb;
  transition: border-color .15s, background .15s;
}
.login-field:focus { border-color: #2d7a4f; background: white; }
.login-btn {
  width: 100%;
  padding: 13px;
  background: #2d7a4f;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 4px;
  transition: background .15s;
}
.login-btn:hover { background: #245f3e; }
.login-btn:active { background: #1d4f34; }
.login-error {
  color: #dc2626;
  font-size: 13px;
  margin-top: 10px;
  min-height: 18px;
}


/* Export buttons */
.export-section { margin-top: 16px; }
.export-row { display: flex; gap: 12px; flex-wrap: wrap; }
.export-btn {
  flex: 1; min-width: 140px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 20px;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: opacity .15s;
}
.export-btn:hover { opacity: 0.85; }
.export-btn:active { opacity: 0.7; }
.btn-pdf { background: #dc2626; color: white; }
.btn-excel { background: #166534; color: white; }
.export-icon { font-size: 18px; }
@media print {
  #login-screen, .export-section, .scale-hdr select { display: none !important; }
  body { padding: 0; background: white; }
  .card { border: 1px solid #e5e7eb; break-inside: avoid; }
  .insight { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .kpi.hl { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}


/* Growth curve */
.growth-chart { position: relative; height: 200px; margin-top: 8px; }
.growth-line-svg { width: 100%; height: 100%; }
.growth-tooltip { position: absolute; background: white; border: 1px solid var(--gb); border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 10; }


/* Scenarios */
.scenario-cards { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.sc-card { flex: 1; min-width: 150px; border-radius: 12px; border: 2px solid var(--gb); background: white; padding: 14px; position: relative; }
.sc-card.active { border-color: var(--g); background: var(--gl); }
.sc-card-title { font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
.sc-card.active .sc-card-title { color: var(--g); }
.sc-card-res { font-size: 18px; font-weight: 800; margin: 6px 0 2px; }
.sc-card-sub { font-size: 11px; color: var(--gray); line-height: 1.5; }
.sc-save-btn { position: absolute; top: 10px; right: 10px; background: var(--g); color: white; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; padding: 3px 8px; cursor: pointer; font-family: inherit; }
.sc-load-btn { width: 100%; margin-top: 8px; background: none; border: 1px solid var(--gb); border-radius: 7px; font-size: 11px; font-weight: 600; padding: 5px; cursor: pointer; font-family: inherit; color: var(--gray); }
.sc-load-btn:hover { border-color: var(--g); color: var(--g); }
.sc-compare { overflow-x: auto; margin-top: 4px; }
.sc-compare table { width: 100%; border-collapse: collapse; font-size: 12px; }
.sc-compare th { text-align: left; padding: 5px 8px; font-size: 11px; color: var(--gray); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid var(--gb); }
.sc-compare td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; }
.sc-compare tr:last-child td { border-bottom: none; }
.sc-compare td:not(:first-child) { text-align: right; font-weight: 600; }
.sc-compare .td-label { color: var(--gray); font-weight: 400; }
.sc-compare .best { color: var(--g); }
.sc-compare .worst { color: var(--r); }


/* Kassaflödesplan */
.cf-table-wrap { overflow-x: auto; margin-top: 8px; }
.cf-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
.cf-table th { padding: 7px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: white; background: #2d7a4f; text-align: right; white-space: nowrap; }
.cf-table th:first-child { text-align: left; }
.cf-table td { padding: 6px 10px; border-bottom: 1px solid #f3f4f6; text-align: right; white-space: nowrap; }
.cf-table td:first-child { text-align: left; color: #6b7280; font-weight: 500; }
.cf-table tr.bold td { font-weight: 700; color: #111827; background: #f9fafb; }
.cf-table tr.pos td:not(:first-child) { color: #2d7a4f; }
.cf-table tr.neg td:not(:first-child) { color: #dc2626; }
.cf-table tr.sep td { border-top: 2px solid #d1fae5; }
.cf-table tr.ack td { background: #e8f5ee; font-weight: 700; }
.cf-table tr.ack td.red { color: #dc2626; background: #fef2f2; }
.cf-table tr.ack td.grn { color: #2d7a4f; }
.cf-bar-wrap { margin-top: 16px; }
.cf-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.cf-bar-lbl { font-size: 11px; color: #6b7280; width: 60px; text-align: right; flex-shrink: 0; }
.cf-bar-track { flex: 1; background: #f3f4f6; border-radius: 4px; height: 20px; position: relative; overflow: hidden; }
.cf-bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; font-weight: 700; color: white; white-space: nowrap; }


/* Känslighetsanalys */
.sens-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.sens-lbl { font-size: 12px; color: var(--gray); font-weight: 500; width: 180px; flex-shrink: 0; }
.sens-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.sens-bar-wrap { display: flex; align-items: center; gap: 6px; }
.sens-bar-track { flex: 1; background: #f3f4f6; border-radius: 4px; height: 22px; position: relative; display: flex; align-items: center; overflow: visible; }
.sens-bar-pos { height: 100%; border-radius: 0 4px 4px 0; background: #2d7a4f; display: flex; align-items: center; padding: 0 6px; font-size: 10px; font-weight: 700; color: white; white-space: nowrap; min-width: 2px; }
.sens-bar-neg { height: 100%; border-radius: 4px 0 0 4px; background: #dc2626; display: flex; align-items: center; justify-content: flex-end; padding: 0 6px; font-size: 10px; font-weight: 700; color: white; white-space: nowrap; min-width: 2px; }
.sens-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
.sens-tag-pos { background: #e8f5ee; color: #2d7a4f; }
.sens-tag-neg { background: #fef2f2; color: #dc2626; }
.sens-legend { display: flex; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
.sens-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray); }
.sens-legend-dot { width: 12px; height: 12px; border-radius: 2px; }



/* Tabs */
.tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 14px; padding: 6px; border: 1px solid #d1fae5; flex-wrap: wrap; }
.tab-btn { flex: 1; min-width: 100px; padding: 10px 8px; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer; color: #6b7280; background: transparent; transition: all .15s; white-space: nowrap; }
.tab-btn.active { background: #2d7a4f; color: white; }
.tab-btn:hover:not(.active) { background: #e8f5ee; color: #2d7a4f; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* Råvarukalkyl */
.rv-ingredient-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.rv-ingredient-row input[type=text] { flex: 2; padding: 8px 12px; border: 1px solid #d1fae5; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; }
.rv-ingredient-row input[type=text]:focus { border-color: #2d7a4f; }
.rv-ingredient-row input[type=number] { flex: 1; padding: 8px 10px; border: 1px solid #d1fae5; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; text-align: right; -moz-appearance: textfield; }
.rv-ingredient-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.rv-ingredient-row input[type=number]:focus { border-color: #2d7a4f; }
.rv-rm-btn { background: none; border: 1px solid #fecaca; border-radius: 8px; color: #dc2626; font-size: 16px; cursor: pointer; padding: 6px 10px; line-height: 1; }
.rv-add-btn { background: #2d7a4f; color: white; border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.rv-result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 16px; }

/* Kundmarginal */
.km-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.km-field { display: flex; flex-direction: column; gap: 5px; }
.km-field label { font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
.km-field input { padding: 10px 12px; border: 1px solid #d1fae5; border-radius: 8px; font-size: 14px; font-weight: 600; color: #111827; font-family: inherit; outline: none; }
.km-field input:focus { border-color: #2d7a4f; }
.km-result-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
.km-result-table td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
.km-result-table td:first-child { color: #6b7280; font-weight: 500; }
.km-result-table td:last-child { text-align: right; font-weight: 700; color: #111827; }
.km-result-table tr.highlight td { background: #e8f5ee; color: #2d7a4f !important; font-weight: 800; }
.km-result-table tr.section td { background: #f9fafb; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af !important; padding: 6px 12px; }
@media(max-width:600px){ .km-input-grid{ grid-template-columns:1fr; } }

</style>

  koppar:15, aktivaKunder:1, pris:30, kostnad:13,
  maskinpris:50000, modell:'lan',
  leasingPerMan:800, koppprispaslag:2, maxKunder:100,

};

const fmtKr=v=>Math.round(v).toLocaleString('sv-SE')+' kr';
const fmtKrOre=v=>v.toLocaleString('sv-SE',{minimumFractionDigits:2,maximumFractionDigits:2})+' kr';
const fmtN=v=>Number(v).toLocaleString('sv-SE');
const fmtD=v=>v<30?Math.round(v)+' dgr':(v/30).toFixed(1)+' mån';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Slider configs: [min, max, step]
const SLCFG={
  koppar:[3,50,1], aktivaKunder:[1,200,1], pris:[15,60,1], kostnad:[5,30,1],
  maskinpris:[10000,150000,1000], leasingPerMan:[200,3000,100],
  koppprispaslag:[1,10,0.5], fastKostnad:[0,250000,500],
  nyaKunderPerMan:[0,10,0.5], tillvaxtManader:[6,36,1]
};

function calc(){
  // Marginal per kopp (pris - råvara). Påslag påverkar INTE mp – det är intern bokföring.
  const mp = S.pris - S.kostnad;

  // Omsättning: koppar × pris × kunder × 30 dagar
  const oms = S.koppar * S.pris * S.aktivaKunder * 30;

  // Råvarukostnad
  const ror = S.koppar * S.kostnad * S.aktivaKunder * 30;

  // Övriga kostnader
  const sumX = S.extraPoster.reduce((a,p) => a + p.belopp, 0);
  const fast = S.fastKostnad + sumX;

  // Leasing = intäkt för oss
  const leasIntakt = S.modell === 'leasing' ? S.leasingPerMan * S.aktivaKunder : 0;
  const omsTotal = oms + leasIntakt;

  // Bruttomarginal = (pris - råvara) × koppar × kunder × 30 + eventuell leasingintäkt
  const bru = mp * S.koppar * 30 * S.aktivaKunder + leasIntakt;

  // Totala kostnader (råvara + övriga – leasing är intäkt inte kostnad)
  const tot = ror + fast;

  // Resultat
  const res = omsTotal - tot;
  const marg = omsTotal > 0 ? ((res / omsTotal) * 100).toFixed(1) : '0.0';

  // Återbetalningstid per maskin (i dagar):
  // Lan:    marginal per dag = mp * koppar
  // Leasing: marginal per dag = mp * koppar + leasingPerMan/30
  // Påslag: marginal per dag = (mp + påslag) * koppar  ← påslaget adderas till marginalen
  const margPerDag = S.modell === 'leasing'
    ? mp * S.koppar + S.leasingPerMan / 30
    : S.modell === 'paslag'
    ? (mp + S.koppprispaslag) * S.koppar
    : mp * S.koppar;

  const atbD = S.maskinpris / margPerDag;

  // Månader tills netto break-even (maskinkostnad täckt av resultat)
  // Totalt kapitalbehov = maskinpris × aktiva kunder
  // Månader = totalt kapitalbehov / månadsresultat (om positivt)
  const totalMaskinKostnad = S.maskinpris * S.aktivaKunder;
  const manadTillBreakEven = res > 0 ? (totalMaskinKostnad / res) : null;

  return {mp, oms, omsTotal, leasIntakt, ror, fast, bru, tot, res, marg, atbD, atbM:(atbD/30).toFixed(1), totalMaskinKostnad, manadTillBreakEven};
}

// Called when slider moves
function sliderChange(key, val) {
  val = Number(val);
  S[key] = val;
  // Sync the number input
  const ni = document.getElementById('ni_'+key);
  if (ni) ni.value = val;
  updateDerived();
}

// Called when number input changes
function numInput(key, val) {
  const cfg = SLCFG[key];
  let v = parseFloat(val);
  if (isNaN(v)) return;
  v = Math.max(cfg[0], Math.min(cfg[1], v));
  S[key] = v;
  // Sync the slider
  const sl = document.getElementById('sl_'+key);
  if (sl) sl.value = v;
  // Sync number input (in case value was clamped)
  const ni = document.getElementById('ni_'+key);
  if (ni && parseFloat(ni.value) !== v) ni.value = v;
  updateDerived();
}

function setText(id,t){ const e=document.getElementById(id); if(e) e.textContent=t; }
function setClass(id,c){ const e=document.getElementById(id); if(e) e.className=c; }

function updateDerived(){
  const c=calc();
  const resPos=c.res>=0;

  setText('kv_oms', fmtKr(c.omsTotal));
  // Sync KM.smoInpris with S.pris
  KM.smoInpris = S.pris;
  const kmPrisEl = document.getElementById('km-smoInpris');
  if (kmPrisEl) kmPrisEl.value = S.pris;
  if (document.getElementById('km-results')) renderKundmarginalResults();
  setText('ks_oms', S.aktivaKunder+' kund × '+S.koppar+' koppar × '+S.pris+' kr × 30d'+(c.leasIntakt>0?' + leasing':''));
  setText('kv_ror', fmtKr(c.ror));
  setText('ks_ror', S.kostnad+' kr/kopp');
  setText('kv_bru', fmtKr(c.bru));
  setText('ks_bru', c.mp+' kr/kopp');
  // Marginalanalys
  setText('km_kopp', fmtKr(c.mp));
  setText('km_kopp_s', S.pris+' kr – '+S.kostnad+' kr råvara');

function renderChart(fast){
  const el=document.getElementById('chart');
  if(!el) return;
  const data=[];
  for(let k=1;k<=S.maxKunder;k+=Math.max(1,Math.floor(S.maxKunder/20))){
    data.push({k,oms:S.pris*S.koppar*30*k+(S.modell==='leasing'?S.leasingPerMan*k:0),kost:S.kostnad*S.koppar*30*k+fast});
  }
  const maxV=Math.max(...data.map(d=>Math.max(d.oms,d.kost)))*1.05;
  const H=200;
  let bars='';
  data.forEach(d=>{
    const ho=Math.round((d.oms/maxV)*H);
    const hk=Math.round((d.kost/maxV)*H);
    bars+=`<div class="bgrp"><div class="bar" style="height:${ho}px;background:#2d7a4f;opacity:.85;flex:1" title="${d.k} kunder – Omsättning: ${fmtKr(d.oms)}"></div><div class="bar" style="height:${hk}px;background:#dc2626;opacity:.75;flex:1" title="${d.k} kunder – Kostnader: ${fmtKr(d.kost)}"></div></div>`;
  });
  const xs=data.filter((_,i)=>i===0||i===Math.floor(data.length/2)||i===data.length-1).map(d=>d.k);
  el.innerHTML=`<div class="chart-bars">${bars}</div><div class="chart-x">${xs.map(k=>`<span>${k}</span>`).join('')}</div>`;
}

// ── känslighetsanalys ─────────────────────────────────────────────────────────
function setSensPct(key, val) {
  S.sensPercent[key] = Math.max(1, Math.min(100, Number(val)));
  renderSensitivity();
}

function renderSensitivity() {
  const el = document.getElementById('sens-content');
  if (!el) return;

  const baseRes = calc().res;
  if (baseRes === 0) {
    el.innerHTML = '<p style="color:#6b7280;font-size:13px">Sätt parametrar för att se känslighetsanalysen.</p>';
    return;
  }

  const params = [
    { lbl: 'Pris till butik/kopp', key: 'pris', fmt: v => v + ' kr' },
    { lbl: 'Råvarukostnad/kopp', key: 'kostnad', fmt: v => v + ' kr', inverse: true },
    { lbl: 'Koppar per dag', key: 'koppar', fmt: v => v + ' st' },
    { lbl: 'Aktiva kunder', key: 'aktivaKunder', fmt: v => v + ' st' },
    { lbl: 'Fasta kostnader', key: 'fastKostnad', fmt: v => Math.round(v).toLocaleString('sv-SE') + ' kr', inverse: true },
  ];
  if (S.modell === 'leasing') params.push({ lbl: 'Leasingavgift/kund', key: 'leasingPerMan', fmt: v => v + ' kr' });
  if (S.modell === 'paslag') params.push({ lbl: 'Påslag per kopp', key: 'koppprispaslag', fmt: v => v + ' kr' });

  const results = params.map(p => {
    const pct = (S.sensPercent[p.key] || 10) / 100;
    const orig = S[p.key];
    const delta = orig * pct;
    S[p.key] = orig + delta; const resPlus = calc().res;
    S[p.key] = orig - delta; const resMinus = calc().res;
    S[p.key] = orig;
    return { ...p, orig, pct, effectPlus: resPlus - baseRes, effectMinus: resMinus - baseRes };
  });

  const maxEffect = Math.max(...results.map(r => Math.max(Math.abs(r.effectPlus), Math.abs(r.effectMinus))), 1);

  const fK = v => {
    const n = Math.round(Math.abs(v));
    return (v >= 0 ? '+' : '–') + n.toLocaleString('sv-SE') + ' kr';
  };

  let h = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:400px">';
  h += '<thead><tr>';
  h += '<th style="text-align:left;padding:6px 8px;font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;border-bottom:2px solid #d1fae5;white-space:nowrap">Parameter</th>';
  h += '<th style="padding:6px 8px;font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;border-bottom:2px solid #d1fae5;white-space:nowrap;text-align:center">Ändring %</th>';
  h += '<th style="padding:6px 8px;font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;border-bottom:2px solid #d1fae5;white-space:nowrap;text-align:right">+X% effekt</th>';
  h += '<th style="padding:6px 8px;font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;border-bottom:2px solid #d1fae5;white-space:nowrap;text-align:right">–X% effekt</th>';
  h += '<th style="padding:6px 8px;font-size:10px;color:#6b7280;font-weight:700;text-transform:uppercase;border-bottom:2px solid #d1fae5;white-space:nowrap;text-align:left">Påverkan</th>';
  h += '</tr></thead><tbody>';

  results.forEach(r => {
    const pctVal = S.sensPercent[r.key] || 10;
    const plusPos = r.effectPlus >= 0;
    const minusPos = r.effectMinus >= 0;
    const barPct = Math.round((Math.abs(r.effectPlus) / maxEffect) * 100);

    h += '<tr style="border-bottom:1px solid #f3f4f6">';

    // Label + current value
    h += '<td style="padding:10px 8px;font-size:12px;font-weight:500;color:#111827;white-space:nowrap">';
    h += r.lbl + '<div style="font-size:10px;color:#9ca3af;margin-top:1px">Nu: ' + r.fmt(r.orig) + '</div></td>';

    // Pct input
    h += '<td style="padding:10px 8px;text-align:center">';
    h += '<div style="display:flex;align-items:center;justify-content:center;gap:3px">';
    h += '<input type="number" min="1" max="100" value="' + pctVal + '" ';
    h += 'oninput="setSensPct(\'' + r.key + '\',this.value)" ';
    h += 'style="width:48px;text-align:center;border:1px solid #d1fae5;border-radius:6px;padding:4px 6px;font-size:13px;font-weight:700;color:#2d7a4f;font-family:inherit;outline:none">';
    h += '<span style="font-size:11px;color:#9ca3af">%</span>';
    h += '</div></td>';

    // +X% effect
    h += '<td style="padding:10px 8px;text-align:right;font-size:13px;font-weight:700;color:' + (plusPos?'#2d7a4f':'#dc2626') + ';white-space:nowrap">' + fK(r.effectPlus) + '</td>';

    // –X% effect
    h += '<td style="padding:10px 8px;text-align:right;font-size:13px;font-weight:700;color:' + (minusPos?'#2d7a4f':'#dc2626') + ';white-space:nowrap">' + fK(r.effectMinus) + '</td>';

    // Visual bar
    h += '<td style="padding:10px 8px;min-width:80px">';
    h += '<div style="background:#f3f4f6;border-radius:4px;height:16px;overflow:hidden">';
    h += '<div style="width:' + barPct + '%;height:100%;background:' + (plusPos?'#2d7a4f':'#dc2626') + ';border-radius:4px;opacity:0.8"></div>';
    h += '</div></td>';

    h += '</tr>';
  });

  h += '</tbody></table></div>';

  // Summary
  const sorted = [...results].sort((a,b) => Math.abs(b.effectPlus) - Math.abs(a.effectPlus));
  const top = sorted[0];
  h += '<div style="margin-top:14px;padding:10px 14px;background:var(--gl);border-radius:8px;font-size:12px;color:#2d7a4f;font-weight:500">';
  h += '💡 <strong>' + top.lbl + '</strong> påverkar resultatet mest — en förändring på ' + (S.sensPercent[top.key]||10) + '% ger <strong>' + fK(top.effectPlus) + '/mån</strong> i resultateffekt.';
  h += '</div>';

  el.innerHTML = h;
}

// ── kassaflödesplan ───────────────────────────────────────────────────────────
function renderCashflow() {
  const wrap = document.getElementById('cf-table-wrap');
  const barsEl = document.getElementById('cf-bars');
  if (!wrap) return;

  const c = calc();
  const newPerMon = S.nyaKunderPerMan;
  const months = 12;

  // Build month data
  // Logik:
  // - Befintliga kunder (S.aktivaKunder) och deras maskiner är redan investerade → sunk cost
  // - Varje ny kund som tillkommer kräver en ny maskininvestering (S.maskinpris)
  // - Ackumulerat kassaflöde startar på 0 (befintliga maskiner är redan köpta)
  // - Varje månads bidrag = månadsresultat för alla kunder – kostnad för nya maskiner den månaden
  const rows = [];
  let ackKassa = 0; // befintliga maskiner är sunk cost, räknas ej in framåt
  let prevKunder = S.aktivaKunder;

  for (let m = 1; m <= months; m++) {
    // Antal kunder denna månad
    const kunder = S.aktivaKunder + Math.round(newPerMon * m);

    // Produktförsäljning (inkl. påslag per kopp om påslagsmodell)
    const effektivtPris = S.modell==='paslag' ? S.pris + S.koppprispaslag : S.pris;
    const produktOms = S.koppar * effektivtPris * kunder * 30;

    // Leasingintäkt (om leasingmodell)
    const leasIntakt = S.modell==='leasing' ? S.leasingPerMan * kunder : 0;

    const oms = produktOms + leasIntakt;
    const ror = S.koppar * S.kostnad * kunder * 30;
    const fast = c.fast;

    // Nya maskiner denna månad
    const nyaKunder = Math.max(0, kunder - prevKunder);
    const maskinInv = nyaKunder * S.maskinpris;
    prevKunder = kunder;

    const res = oms - ror - fast;
    const nettoKassaflode = res - maskinInv;
    ackKassa += nettoKassaflode;
    rows.push({ m, kunder, nyaKunder, produktOms, leasIntakt, oms, ror, fast, res, maskinInv, nettoKassaflode, ackKassa });
  }

  // Build table
  let t = '<table class="cf-table"><thead><tr>';
  t += '<th>Rad</th>';
  rows.forEach(r => t += '<th>Mån ' + r.m + '</th>');
  t += '</tr></thead><tbody>';

  function tr(lbl, vals, cls, fmt) {
    t += '<tr class="' + (cls||'') + '"><td>' + lbl + '</td>';
    vals.forEach(v => {
      const n = parseFloat(v);
      let tdCls = '';
      if (cls === 'ack') tdCls = n >= 0 ? 'grn' : 'red';
      t += '<td class="' + tdCls + '">' + (fmt ? fmt(v) : v) + '</td>';
    });
    t += '</tr>';
  }

  const fK = v => {
    const n = Math.round(v);
    return (n < 0 ? '–' : '') + Math.abs(n).toLocaleString('sv-SE') + ' kr';
  };

  tr('Aktiva kunder', rows.map(r => r.kunder));
  t += '<tr class="sep bold"><td colspan="' + (months+1) + '" style="padding:4px 10px;font-size:10px;color:#6b7280;background:#f9fafb">INTÄKTER</td></tr>';
  const basOms = rows.map(r => S.koppar * S.pris * r.kunder * 30);
  tr('Produktförsäljning', basOms, 'pos', fK);
  if (S.modell==='paslag') {
    tr('Påslag/kopp (maskinamortering)', rows.map(r => S.koppprispaslag * S.koppar * r.kunder * 30), 'pos', fK);
  }
  if (rows.some(r => r.leasIntakt > 0)) {
    tr('Leasingintäkt', rows.map(r => r.leasIntakt), 'pos', fK);
  }
  tr('Total omsättning', rows.map(r => r.oms), 'bold', fK);
  t += '<tr class="sep bold"><td colspan="' + (months+1) + '" style="padding:4px 10px;font-size:10px;color:#6b7280;background:#f9fafb">KOSTNADER</td></tr>';
  tr('Råvarukostnad', rows.map(r => -r.ror), 'neg', fK);
  tr('Fasta kostnader', rows.map(r => -r.fast), 'neg', fK);
  if (rows.some(r => r.maskinInv > 0)) {
    tr('Nya maskiner (st)', rows.map(r => r.nyaKunder > 0 ? r.nyaKunder : '–'));
    tr('Maskininvestering', rows.map(r => r.maskinInv > 0 ? -r.maskinInv : 0), 'neg', fK);
  }
  t += '<tr class="sep"></tr>';
  tr('Månadsresultat', rows.map(r => r.res), 'bold', fK);
  tr('Netto kassaflöde', rows.map(r => r.nettoKassaflode), 'bold', fK);
  t += '<tr class="sep"></tr>';
  tr('Ackumulerat', rows.map(r => r.ackKassa), 'ack', fK);
  t += '</tbody></table>';
  wrap.innerHTML = t;

  // Bar chart of ackumulerat kassaflöde
  const maxAbs = Math.max(...rows.map(r => Math.abs(r.ackKassa)), 1);
  let bars = '<div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Ackumulerat kassaflöde</div>';
  rows.forEach(r => {
    const pct = Math.round((Math.abs(r.ackKassa) / maxAbs) * 100);
    const pos = r.ackKassa >= 0;
    bars += '<div class="cf-bar-row">';
    bars += '<div class="cf-bar-lbl">Mån ' + r.m + '</div>';
    bars += '<div class="cf-bar-track">';
    bars += '<div class="cf-bar-fill" style="width:' + pct + '%;background:' + (pos?'#2d7a4f':'#dc2626') + '">' + (Math.abs(r.ackKassa) > maxAbs*0.15 ? fK(r.ackKassa) : '') + '</div>';
    bars += '</div>';
    if (Math.abs(r.ackKassa) <= maxAbs*0.15) {
      bars += '<div style="font-size:10px;font-weight:700;color:' + (pos?'#2d7a4f':'#dc2626') + ';min-width:70px">' + fK(r.ackKassa) + '</div>';
    }
    bars += '</div>';
  });
  barsEl.innerHTML = bars;
}

      h += '<div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Scenario ' + (i+1) + '</div>';

}

function saveScenario(i) {
  const c = calc();
  const nameEl = document.getElementById('sc-name-' + i);
  const defaultNames = ['Pessimistisk','Realistisk','Optimistisk'];
  const namn = nameEl ? (nameEl.value.trim() || defaultNames[i]) : defaultNames[i];
  S.scenarios[i] = {
    namn: namn,
    koppar: S.koppar, aktivaKunder: S.aktivaKunder,
    pris: S.pris, kostnad: S.kostnad,
    fastKostnad: S.fastKostnad, maskinpris: S.maskinpris,
    modell: S.modell, leasingPerMan: S.leasingPerMan,
    koppprispaslag: S.koppprispaslag,
    mp: c.mp, bru: c.bru, res: c.res, marg: c.marg,
    omsTotal: c.omsTotal, tot: c.tot,
    atbM: c.atbM, beMan: c.manadTillBreakEven,
    yr1: c.res*12 - c.totalMaskinKostnad
  };
  renderScenarioCards();
  renderScenarioCompare();
}

function updateScenario(i) {
  // Overwrite scenario i with current values, keep same name
  const existingName = S.scenarios[i] ? S.scenarios[i].namn : 'Scenario ' + (i+1);
  const c = calc();
  S.scenarios[i] = {
    namn: existingName,
    koppar: S.koppar, aktivaKunder: S.aktivaKunder,
    pris: S.pris, kostnad: S.kostnad,
    fastKostnad: S.fastKostnad, maskinpris: S.maskinpris,
    modell: S.modell, leasingPerMan: S.leasingPerMan,
    koppprispaslag: S.koppprispaslag,
    mp: c.mp, bru: c.bru, res: c.res, marg: c.marg,
    omsTotal: c.omsTotal, tot: c.tot,
    atbM: c.atbM, beMan: c.manadTillBreakEven,
    yr1: c.res*12 - c.totalMaskinKostnad
  };
  renderScenarioCards();
  renderScenarioCompare();
}

function deleteScenario(i) {
  S.scenarios[i] = null;
  renderScenarioCards();
  renderScenarioCompare();
}

function loadScenario(i) {
  const sc = S.scenarios[i];
  if (!sc) return;
  S.koppar = sc.koppar; S.aktivaKunder = sc.aktivaKunder;
  S.pris = sc.pris; S.kostnad = sc.kostnad;
  S.fastKostnad = sc.fastKostnad; S.maskinpris = sc.maskinpris;
  S.modell = sc.modell; S.leasingPerMan = sc.leasingPerMan;
  S.koppprispaslag = sc.koppprispaslag;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderScenarioCompare() {
  renderScenarioCards();
  const active = S.scenarios.filter(Boolean);
  const wrap = document.getElementById('sc-compare-wrap');
  const tbl = document.getElementById('sc-compare');
  if (!wrap || !tbl) return;
  if (active.length < 2) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  const rows = [
    { lbl: 'Omsättning/mån', key: 'omsTotal', fmt: fmtKr },
    { lbl: 'Månadsresultat', key: 'res', fmt: fmtKr },
    { lbl: 'Årsresultat', key: v => v.res*12, fmt: fmtKr },
    { lbl: 'År 1 inkl. maskin', key: 'yr1', fmt: fmtKr },
    { lbl: 'Bruttomarginal/mån', key: 'bru', fmt: fmtKr },
    { lbl: 'Rörelsemarginal', key: 'marg', fmt: v => v+'%' },
    { lbl: 'Marginal/kopp', key: 'mp', fmt: v => v+' kr' },
    { lbl: 'Återbetalningstid', key: 'atbM', fmt: v => v+' mån' },
    { lbl: 'Break-even (total)', key: 'beMan', fmt: v => v!==null?v.toFixed(1)+' mån':'–' },
  ];

  const scs = S.scenarios.filter(Boolean);
  let html2 = '<table><thead><tr><th>Nyckeltal</th>';
  scs.forEach(sc => { html2 += `<th style="color:#2d7a4f">${sc.namn}</th>`; });
  html2 += '</tr></thead><tbody>';

  rows.forEach(row => {
    const vals = scs.map(sc => typeof row.key === 'function' ? row.key(sc) : sc[row.key]);
    const numVals = vals.map(v => parseFloat(v));
    const maxV = Math.max(...numVals.filter(v => !isNaN(v)));
    const minV = Math.min(...numVals.filter(v => !isNaN(v)));
    html2 += `<tr><td class="td-label">${row.lbl}</td>`;
    vals.forEach((v,i) => {
      const n = parseFloat(v);
      let cls = '';
      if (!isNaN(n) && maxV !== minV) {
        cls = n === maxV ? 'best' : n === minV ? 'worst' : '';
      }
      html2 += `<td class="${cls}">${row.fmt(v)}</td>`;
    });
    html2 += '</tr>';
  });

  html2 += '</tbody></table>';
  tbl.innerHTML = html2;
}


// ── growth curve ──────────────────────────────────────────────────────────────
function renderGrowth() {
  const svg = document.getElementById('growth-svg');
  const tooltip = document.getElementById('growth-tooltip');
  const summary = document.getElementById('growth-summary');
  if (!svg) return;
  // Don't render if login screen is visible
  const loginScreen = document.getElementById('login-screen');
  if (loginScreen && loginScreen.style.display !== 'none') return;

  const c = calc();
  const months = S.tillvaxtManader;
  const newPerMonth = S.nyaKunderPerMan;

  // Build data: start with current aktivaKunder, add newPerMonth each month
  const data = [];
  let cumResult = -c.totalMaskinKostnad; // start negative (machine investment)
  for (let m = 1; m <= months; m++) {
    const kunder = Math.round(S.aktivaKunder + newPerMonth * m);
    const oms = S.koppar * S.pris * kunder * 30 + (S.modell==='leasing'?S.leasingPerMan*kunder:0);
    const ror = S.koppar * S.kostnad * kunder * 30;
    const maskinInv = newPerMonth > 0 ? Math.round(newPerMonth) * S.maskinpris : 0;
    // New machines this month cost money up front
    const monthRes = oms - ror - c.fast;
    cumResult += monthRes - maskinInv;
    data.push({ m, kunder, monthRes, cumResult, maskinInv });
  }

  const W = svg.getBoundingClientRect().width || 600;
  const H = 200;
  const padL = 52, padR = 16, padT = 12, padB = 28;
  const cw = W - padL - padR;
  const ch = H - padT - padB;

  const allVals = [...data.map(d=>d.monthRes), ...data.map(d=>d.cumResult), 0];
  const minV = Math.min(...allVals);
  const maxV = Math.max(...allVals);
  const range = maxV - minV || 1;

  const xS = (m) => padL + ((m-1)/(months-1||1)) * cw;
  const yS = (v) => padT + (1 - (v - minV)/range) * ch;

  // Build SVG
  let s = '';

  // Grid lines
  for (let i=0; i<=4; i++) {
    const v = minV + (range/4)*i;
    const y = yS(v);
    s += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#f0f0f0" stroke-width="1"/>`;
    s += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#9ca3af">${Math.round(v/1000)}k</text>`;
  }

  // Zero line
  if (minV < 0 && maxV > 0) {
    const y0 = yS(0);
    s += `<line x1="${padL}" y1="${y0}" x2="${W-padR}" y2="${y0}" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>`;
    s += `<text x="${padL-4}" y="${y0+4}" text-anchor="end" font-size="9" fill="#dc2626">0</text>`;
  }

  // Break-even line (cumulative = 0)
  const beMonth = data.find(d => d.cumResult >= 0);

  // Cumulative line (blue)
  const cumPts = data.map(d => `${xS(d.m)},${yS(d.cumResult)}`).join(' ');
  s += `<polyline points="${cumPts}" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.7"/>`;

  // Monthly result line (green)
  const monPts = data.map(d => `${xS(d.m)},${yS(d.monthRes)}`).join(' ');
  s += `<polyline points="${monPts}" fill="none" stroke="#2d7a4f" stroke-width="2"/>`;

  // Dots + hover areas
  data.forEach(d => {
    const x = xS(d.m); const y = yS(d.monthRes);
    const yc = yS(d.cumResult);
    s += `<circle cx="${x}" cy="${y}" r="3" fill="#2d7a4f" opacity="0.8"/>`;
    s += `<circle cx="${x}" cy="${yc}" r="3" fill="#1d4ed8" opacity="0.7"/>`;
    const tip = encodeURIComponent(JSON.stringify({m:d.m,kunder:d.kunder,monthRes:d.monthRes,cumResult:d.cumResult}));
    s += `<rect x="${x-8}" y="${padT}" width="16" height="${ch}" fill="transparent" onmouseenter="showGrowthTip(event,'${tip}')" onmouseleave="hideGrowthTip()" ontouchstart="showGrowthTip(event,'${tip}')"/>`;
  });

  // Break-even marker
  if (beMonth) {
    const bx = xS(beMonth.m);
    s += `<line x1="${bx}" y1="${padT}" x2="${bx}" y2="${H-padB}" stroke="#2d7a4f" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>`;
    s += `<text x="${bx}" y="${padT-2}" text-anchor="middle" font-size="8" fill="#2d7a4f" font-weight="bold">BE mån ${beMonth.m}</text>`;
  }

  // X-axis labels
  const step = Math.max(1, Math.floor(months/6));
  for (let m=1; m<=months; m+=step) {
    s += `<text x="${xS(m)}" y="${H-padB+14}" text-anchor="middle" font-size="9" fill="#9ca3af">Mån ${m}</text>`;
  }

  svg.innerHTML = s;

  // Summary
  const lastD = data[data.length-1];
  const beText = beMonth
    ? `Break-even på ackumulerat kapital nås <strong>månad ${beMonth.m}</strong> med <strong>${beMonth.kunder} kunder</strong>.`
    : `Break-even nås inte inom ${months} månader – öka marginalen eller sänk maskinkostnaden.`;
  summary.innerHTML = `
    Vid månad ${months}: <strong>${lastD.kunder} kunder</strong> → månadsresultat <strong>${fmtKr(lastD.monthRes)}</strong> → ackumulerat resultat <strong style="color:${lastD.cumResult>=0?'#2d7a4f':'#dc2626'}">${fmtKr(lastD.cumResult)}</strong><br>
    ${beText}
  `;
}

function showGrowthTip(e, encoded) {
  const d = JSON.parse(decodeURIComponent(encoded));
  const tip = document.getElementById('growth-tooltip');
  tip.style.display = 'block';
  tip.innerHTML = `<strong>Månad ${d.m}</strong> (${d.kunder} kunder)<br>
    <span style="color:#2d7a4f">Månadsresultat: ${fmtKr(d.monthRes)}</span><br>
    <span style="color:#1d4ed8">Ackumulerat: ${fmtKr(d.cumResult)}</span>`;
  tip.style.left = Math.min(e.offsetX + 10, 200) + 'px';
  tip.style.top = (e.offsetY - 10) + 'px';
}
function hideGrowthTip() {
  const tip = document.getElementById('growth-tooltip');
  if (tip) tip.style.display = 'none';
}

          <div class="kpi-lbl">Årsresultat (löpande)</div>
          <div class="kpi-val" id="kv_ar">${fmtKr(c.res*12)}</div>
          <div class="kpi-sub" id="ks_ar">${c.manadTillBreakEven!==null
            ? 'Netto efter break-even om '+c.manadTillBreakEven.toFixed(1)+' mån'
            : 'Break-even ej möjlig'}</div>
          <div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.25)" id="kpi_ar_yr1">
            <div style="font-size:10px;opacity:0.8;margin-bottom:2px">ÅR 1 INKL. MASKININVESTERING</div>
            <div style="font-size:14px;font-weight:800" id="kv_ar_yr1">${fmtKr(c.res*12 - c.totalMaskinKostnad)}</div>

    <div class="scards">
      <div class="sc sc-g"><div class="sc-lbl" id="sc_oms_lbl">Omsättning vid ${S.maxKunder} kunder</div><div class="sc-val" id="sc_oms_val">${fmtKr(S.pris*S.koppar*30*S.maxKunder+(S.modell==='leasing'?S.leasingPerMan*S.maxKunder:0))}</div><div class="sc-sub">per månad</div></div>
      <div class="sc sc-r"><div class="sc-lbl" id="sc_kost_lbl">Total kostnad vid ${S.maxKunder} kunder</div><div class="sc-val" id="sc_kost_val">${fmtKr(S.kostnad*S.koppar*30*S.maxKunder+c.fast)}</div><div class="sc-sub">per månad</div></div>
      <div class="sc sc-b"><div class="sc-lbl" id="sc_res_lbl">Resultat vid ${S.maxKunder} kunder</div><div class="sc-val" id="sc_res_val">${fmtKr((S.pris-S.kostnad)*S.koppar*30*S.maxKunder+(S.modell==='leasing'?S.leasingPerMan*S.maxKunder:0)-c.fast)}</div><div class="sc-sub">per månad</div></div>
    </div>
    <div id="chart"></div>
    <div class="chart-legend"><div class="leg"><div class="leg-dot" style="background:#2d7a4f"></div>Omsättning</div><div class="leg"><div class="leg-dot" style="background:#dc2626"></div>Totala kostnader</div></div>

  <div class="card" id="scenario-card">
    <h2 style="margin-bottom:4px">Scenario-jämförelse</h2>

    <div class="scenario-cards" id="sc-cards"></div>
    <div id="sc-compare-wrap" style="display:none">
      <div class="sc-compare" id="sc-compare"></div>
    </div>

  <div class="card" id="growth-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <h2 style="margin:0">Tillväxtkurva</h2>
    </div>
    <p class="sub">Hur utvecklas resultatet om ni lägger till nya kunder löpande?</p>
    <div class="grid2" style="margin-bottom:16px">
      <div>
        ${sl('nyaKunderPerMan','Nya kunder per månad',S.nyaKunderPerMan,'st/mån')}

        ${sl('tillvaxtManader','Visa antal månader',S.tillvaxtManader,'mån')}

      <div class="leg"><div class="leg-dot" style="background:#1d4ed8"></div>Ackumulerat resultat</div>

    <div id="growth-summary" style="margin-top:14px;border-radius:10px;padding:12px 16px;font-size:13px;font-weight:500;line-height:1.8;background:var(--gl);border:1px solid var(--gb);color:#2d7a4f"></div>

  <div class="card" id="cashflow-card">

    <div class="ins-obs" id="ins_obs">Obs: Kapitalbehov för ${S.aktivaKunder} maskiner just nu: ${fmtKr(S.maskinpris*S.aktivaKunder)} — planera finansiering i god tid innan vi skalar upp.</div>

// ── export ────────────────────────────────────────────────────────────────────
function exportPDF() {
  const c = calc();
  const resPos = c.res >= 0;
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  script.onload = function() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const G=[45,122,79], R=[220,38,38], D=[17,24,39], GR=[107,114,128];
    const GL=[233,245,238], RL=[254,242,242], BL=[239,246,255];
    const W=210, ML=14, MR=14, CW=W-ML-MR;
    const fmtK=v=>Math.round(v).toLocaleString('sv-SE')+' kr';
    const fmtD=v=>v<30?Math.round(v)+' dgr':(v/30).toFixed(1)+' mån';
    const today=new Date().toLocaleDateString('sv-SE');

    // ── HEADER ──────────────────────────────────────────────────────────
    doc.setFillColor(...G);
    doc.rect(0,0,W,24,'F');
    const logoW=58, logoH=58/3.871;
    doc.setFillColor(249,246,241);
    doc.roundedRect(ML,3,logoW+2,logoH+2,1,1,'F');
    doc.addImage(L,'PNG',ML+1,4,logoW,logoH);
    doc.setTextColor(255,255,255);
    doc.setFontSize(13); doc.setFont('helvetica','bold');
    doc.text('Affärsmodellkalkylator',W-MR,12,{align:'right'});
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text(today,W-MR,19,{align:'right'});
    let y=28;

    // ── helpers ──────────────────────────────────────────────────────────
    function secBar(t) {
      doc.setFillColor(...G);
      doc.rect(ML,y,CW,5.5,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.text(t.toUpperCase(),ML+2,y+4);
      y+=7;
    }

    // Single full-width row: label left, value right
    function row(lbl,val,bold,col,indent) {
      doc.setFontSize(8);
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.setTextColor(...(col||D));
      const x=ML+(indent?4:0);
      const maxW=CW*0.65;
      doc.text(lbl,x,y,{maxWidth:maxW});
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.text(String(val),W-MR,y,{align:'right'});
      y+=5;
    }

    function sep() {
      doc.setDrawColor(209,250,229);
      doc.line(ML,y-1,W-MR,y-1);
      y+=1;
    }

    function kpiRow(items) {
      // items: [{lbl, val, sub, hl}]
      const n=items.length;
      const bw=(CW-(n-1)*4)/n;
      items.forEach((it,i)=>{
        const x=ML+i*(bw+4);
        const bh=18;
        if(it.hl){
          doc.setFillColor(...G);
        } else if(it.red){
          doc.setFillColor(...R);
        } else {
          doc.setFillColor(249,250,251);
        }
        doc.roundedRect(x,y,bw,bh,1.5,1.5,'F');
        const tc=it.hl||it.red?[255,255,255]:GR;
        const vc=it.hl||it.red?[255,255,255]:D;
        doc.setFontSize(6); doc.setFont('helvetica','bold'); doc.setTextColor(...tc);
        doc.text(it.lbl.toUpperCase(),x+2,y+5);
        doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...vc);
        doc.text(it.val,x+2,y+12);
        if(it.sub){ doc.setFontSize(6); doc.setFont('helvetica','normal'); doc.setTextColor(...(it.hl||it.red?[200,235,215]:GR)); doc.text(it.sub,x+2,y+17); }
      });
      y+=22;
    }

    // ── MARGINALANALYS ────────────────────────────────────────────────────
    secBar('Marginalanalys per kopp');
    kpiRow([
      {lbl:'Marginal / kopp', val:fmtK(c.mp), sub:S.pris+' kr – '+S.kostnad+' kr råvara'},
      {lbl:'Täckningsgrad', val:(S.pris>0?Math.round(c.mp/S.pris*100):0)+'%', sub:'Marginal ÷ pris'},
      {lbl:'TB / dag (per kund)', val:fmtK(c.mp*S.koppar), sub:c.mp+' kr × '+S.koppar+' koppar'},
      {lbl:'TB / mån (alla kunder)', val:fmtK(c.mp*S.koppar*30*S.aktivaKunder), sub:S.aktivaKunder+' kund(er) × 30d', hl:true},
    ]);

    // ── TWO COLUMNS: Parametrar + Resultaträkning ─────────────────────────
    const colW=(CW-6)/2;
    const c2x=ML+colW+6;
    y+=10;
    const colStartY=y;

    // LEFT: Parametrar
    doc.setFillColor(...G); doc.rect(ML,y,colW,5.5,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('PARAMETRAR',ML+2,y+4);
    y+=7;

    function prow(lbl,val) {
      doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(...GR);
      // Truncate label to fit left column (max ~55% of colW)
      const maxLblW = colW * 0.58;
      doc.text(lbl, ML, y, {maxWidth: maxLblW});
      doc.setFont('helvetica','bold'); doc.setTextColor(...D);
      // Value right-aligned, truncate if needed
      doc.text(String(val), ML+colW, y, {align:'right', maxWidth: colW*0.38});
      y+=4.8;
    }
    prow('Koppar/dag (per kund)',S.koppar+' st');
    prow('Aktiva kunder',S.aktivaKunder+' st');
    prow('Pris till butik/kopp',S.pris+' kr');
    prow('Råvarukostnad/kopp',S.kostnad+' kr');
    prow('Fasta månadskostnader',fmtK(S.fastKostnad));
    prow('Maskinpris/maskin',fmtK(S.maskinpris));
    const modTxt=S.modell==='lan'?'Äger & lånar ut':S.modell==='leasing'?'Butiken leasar':'Påslag/kopp';
    prow('Affärsmodell',modTxt);
    if(S.modell==='leasing') prow('Leasingavgift/kund/mån',fmtK(S.leasingPerMan));
    if(S.modell==='paslag') prow('Påslag per kopp',S.koppprispaslag+' kr');
    if(S.extraPoster.length>0){
      doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(...GR);
      doc.text('Övriga rörliga:',ML,y); y+=4.8;
      S.extraPoster.forEach(p=>prow('  '+p.namn,fmtK(p.belopp)));
    }
    const leftEndY=y;

    // RIGHT: Resultaträkning
    y=colStartY;
    doc.setFillColor(...G); doc.rect(c2x,y,colW,5.5,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('RESULTATRÄKNING / MÅN',c2x+2,y+4);
    y+=7;

    function rrow(lbl,val,bold,col) {
      doc.setFontSize(7.5);
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.setTextColor(...(col||D));
      doc.text(lbl,c2x,y,{maxWidth:colW*0.62});
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.text(String(val),c2x+colW,y,{align:'right'});
      y+=4.8;
    }
    function rsep(){ doc.setDrawColor(209,250,229); doc.line(c2x,y-1,c2x+colW,y-1); y+=1.5; }

    rrow('Omsättning',fmtK(c.omsTotal),true,G);
    if(S.modell==='leasing') rrow('  Leasingintäkt','+'+fmtK(c.leasIntakt),false,G);
    rsep();
    rrow('Råvarukostnad','–'+fmtK(c.ror),false,R);
    rsep();
    rrow('Bruttoresultat',fmtK(c.bru),true,c.bru>=0?G:R);
    rsep();
    rrow('Fasta kostnader','–'+fmtK(S.fastKostnad),false,R);
    S.extraPoster.forEach(p=>rrow('  '+p.namn,'–'+fmtK(p.belopp),false,R));
    rsep();
    rrow('Rörelseresultat (EBIT)',fmtK(c.res),true,c.res>=0?G:R);
    const rightEndY=y;

    y=Math.max(leftEndY,rightEndY)+4;

    // ── RESULTATBOX – tre kolumner i bredden ─────────────────────────────
    const bc=resPos?G:R;
    doc.setFillColor(...bc);
    doc.roundedRect(ML,y,CW,18,2,2,'F');
    doc.setTextColor(255,255,255);
    const third=CW/3;
    const items3=[
      {lbl:'MÅNADSRESULTAT', val:fmtK(c.res)},
      {lbl:'ÅRSRESULTAT', val:fmtK(c.res*12)},
      {lbl:'RÖRELSEMARGINAL', val:c.marg+'%'},
    ];
    items3.forEach((it,i)=>{
      const cx=ML+third*i+third/2;
      doc.setFontSize(8); doc.setFont('helvetica','bold');
      doc.setTextColor(255,255,255);
      doc.text(it.lbl,cx,y+7,{align:'center'});
      doc.setFontSize(13); doc.setFont('helvetica','bold');
      doc.setTextColor(255,255,255);
      doc.text(it.val,cx,y+15,{align:'center'});
      if(i<2){
        doc.setDrawColor(255,255,255);
        doc.setLineWidth(0.3);
        doc.line(ML+third*(i+1),y+3,ML+third*(i+1),y+17);
        doc.setLineWidth(0.2);
      }
    });
    y+=23;

    // ── KPI STRIP ─────────────────────────────────────────────────────────
    kpiRow([
      {lbl:'Omsättning / år', val:fmtK(c.omsTotal*12), sub:S.aktivaKunder+' kund(er)'},
      {lbl:'Totala kostnader/mån', val:fmtK(c.tot), sub:'Rörligt + Övriga'},
      {lbl:'Bruttomarginal/mån', val:fmtK(c.bru), sub:c.mp+' kr/kopp', hl:true},
    ]);

    // ── SKALBARHET & MASKIN ───────────────────────────────────────────────
    secBar('Skalbarhet (vid '+S.maxKunder+' kunder) & maskin');
    const scOms=S.pris*S.koppar*30*S.maxKunder+(S.modell==='leasing'?S.leasingPerMan*S.maxKunder:0);
    const scKost=S.kostnad*S.koppar*30*S.maxKunder+c.fast;
    const scRes=scOms-scKost;
    kpiRow([
      {lbl:'Omsättning/mån', val:fmtK(scOms), sub:'vid '+S.maxKunder+' kunder'},
      {lbl:'Totala kostnader/mån', val:fmtK(scKost), sub:'vid '+S.maxKunder+' kunder'},
      {lbl:'Resultat/mån', val:fmtK(scRes), sub:'vid '+S.maxKunder+' kunder', hl:scRes>=0, red:scRes<0},
    ]);

    // Maskin row
    doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(...D);
    doc.text('Återbetalningstid/maskin:',ML,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(...G);
    doc.text(fmtD(c.atbD)+' vid '+S.koppar+' koppar/dag',ML+42,y);
    doc.setFont('helvetica','normal'); doc.setTextColor(...D);
    doc.text('Kapitalbehov ('+S.aktivaKunder+' maskiner):',c2x,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(...R);
    doc.text(fmtK(S.maskinpris*S.aktivaKunder),W-MR,y,{align:'right'});
    y+=10;

    // ── BREAK-EVEN ────────────────────────────────────────────────────────
    const beColor = c.manadTillBreakEven!==null ? G : R;
    const beLightColor = c.manadTillBreakEven!==null ? GL : RL;
    doc.setFillColor(...beLightColor);
    doc.roundedRect(ML,y,CW,c.manadTillBreakEven!==null?20:12,2,2,'F');
    doc.setDrawColor(...beColor);
    doc.setLineWidth(0.5);
    doc.roundedRect(ML,y,CW,c.manadTillBreakEven!==null?20:12,2,2,'S');
    doc.setLineWidth(0.2);

    if(c.manadTillBreakEven!==null){
      const man=c.manadTillBreakEven.toFixed(1);
      const arsvinstEfter=fmtK(c.res*12);
      const yr1=fmtK(c.res*12-c.totalMaskinKostnad);
      doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(...G);
      doc.text('🟢  Netto break-even om '+man+' månader', ML+4, y+7);
      doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(...D);
      doc.text('Maskinkostnad '+fmtK(c.totalMaskinKostnad)+' täcks av månadsresultat '+fmtK(c.res)+' × '+man+' mån', ML+4, y+13);
      doc.setFont('helvetica','bold'); doc.setTextColor(...G);
      doc.text('→ Löpande årsvinst efter break-even: '+arsvinstEfter+'/år    |    År 1 inkl. maskininvestering: '+yr1, ML+4, y+19);
    } else {
      doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(...R);
      doc.text('🔴  Break-even ej möjlig – månadsresultatet är negativt', ML+4, y+8);
    }
    y+=c.manadTillBreakEven!==null?24:16;

    // ── FOOTER ───────────────────────────────────────────────────────────
    doc.setFillColor(249,250,251);
    doc.rect(0,286,W,11,'F');
    doc.setTextColor(...GR); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Smoother AB – Konfidentiellt',ML,292);
    doc.text('Genererad '+today,W-MR,292,{align:'right'});

    doc.save('Smoother_'+today.replace(/\//g,'-')+'.pdf');
  };
  script.onerror=function(){alert('Kunde inte ladda PDF-biblioteket. Kontrollera internetanslutningen.');};
  document.head.appendChild(script);
}

function exportExcel() {
  const c = calc();
  // Build CSV content (opens cleanly in Excel)
  const rows = [
    ['Smoother AB – Affärsmodellkalkylator', ''],
    ['', ''],
    ['PARAMETRAR', ''],
    ['Koppar per dag (per kund)', S.koppar],
    ['Aktiva kunder', S.aktivaKunder],
    ['Pris till butik per kopp (kr)', S.pris],
    ['Rörlig kostnad per kopp – råvara (kr)', S.kostnad],
    ['Fasta månadskostnader (kr)', S.fastKostnad],
    ['Maskinpris per maskin (kr)', S.maskinpris],
    ['Affärsmodell', S.modell === 'lan' ? 'Vi äger & lånar ut' : S.modell === 'leasing' ? 'Butiken leasar' : 'Påslag per kopp'],
  ];
  if (S.modell === 'leasing') rows.push(['Leasingavgift per kund/mån (kr)', S.leasingPerMan]);
  if (S.modell === 'paslag') rows.push(['Påslag per kopp för maskin (kr)', S.koppprispaslag]);
  if (S.extraPoster.length > 0) {
    rows.push(['', '']);
    rows.push(['ÖVRIGA RÖRLIGA KOSTNADER', '']);
    S.extraPoster.forEach(p => rows.push([p.namn, p.belopp]));
  }
  rows.push(['', '']);
  rows.push(['RESULTATRÄKNING / MÅN', '']);
  rows.push(['Omsättning (kr)', Math.round(c.omsTotal)]);
  if (S.modell === 'leasing') rows.push(['  varav leasingintäkt (kr)', Math.round(c.leasIntakt)]);
  rows.push(['Råvarukostnad (kr)', '-' + Math.round(c.ror)]);
  rows.push(['Bruttoresultat (kr)', Math.round(c.bru)]);
  rows.push(['Fasta kostnader (kr)', '-' + Math.round(S.fastKostnad)]);
  S.extraPoster.forEach(p => rows.push(['  ' + p.namn + ' (kr)', '-' + p.belopp]));
  rows.push(['Rörelseresultat / EBIT (kr)', Math.round(c.res)]);
  rows.push(['Rörelsemarginal (%)', c.marg]);
  rows.push(['', '']);
  rows.push(['NYCKELTAL', '']);
  rows.push(['Årsresultat (kr)', Math.round(c.res * 12)]);
  rows.push(['Total omsättning/år (kr)', Math.round(c.omsTotal * 12)]);
  rows.push(['Återbetalningstid per maskin', (c.atbD / 30).toFixed(1) + ' månader']);
  rows.push(['Kapitalbehov – ' + S.aktivaKunder + ' maskiner (kr)', Math.round(S.maskinpris * S.aktivaKunder)]);
  rows.push(['', '']);
  rows.push(['SKALBARHET (vid ' + S.maxKunder + ' kunder)', '']);
  rows.push(['Omsättning (kr)', Math.round(S.pris * S.koppar * 30 * S.maxKunder + (S.modell === 'leasing' ? S.leasingPerMan * S.maxKunder : 0))]);
  rows.push(['Total kostnad (kr)', Math.round(S.kostnad * S.koppar * 30 * S.maxKunder + c.fast)]);
  rows.push(['Resultat (kr)', Math.round((S.pris - S.kostnad) * S.koppar * 30 * S.maxKunder + (S.modell === 'leasing' ? S.leasingPerMan * S.maxKunder : 0) - c.fast)]);

  // Convert to CSV with BOM for Excel Swedish encoding
  const BOM = '\uFEFF';
  const csv = BOM + rows.map(r => r.map(v => {
    const s = String(v);
    return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(';')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Smoother_kalkylator.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function rvSynka() {
  // Calculate current cost per kopp
  const sumRaw = RV.ingredienser.reduce((a,p) => a + (p.kr||0), 0);

  S.kostnad = Math.round(kostnadPerKopp * 100) / 100; // keep 2 decimal precision
  // Sync slider

function kpiHtml(lbl, val, sub, hl) {
  const bg = hl ? '#2d7a4f' : 'white';
  const bc = hl ? '#2d7a4f' : '#d1fae5';
  const tc = hl ? 'rgba(255,255,255,0.75)' : '#6b7280';
  const vc = hl ? 'white' : '#111827';
  const sc = hl ? 'rgba(255,255,255,0.7)' : '#9ca3af';
  return '<div style="flex:1;min-width:120px;background:'+bg+';border:1px solid '+bc+';border-radius:12px;padding:14px 16px">'
    + '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;color:'+tc+'">'+lbl+'</div>'
    + '<div style="font-size:20px;font-weight:800;color:'+vc+'">'+val+'</div>'
    + '<div style="font-size:11px;color:'+sc+';margin-top:4px">'+sub+'</div>'
    + '</div>';
}

function renderKundmarginalResults() {
  const el = document.getElementById('km-results');
  if (!el) return;

  const momsMulti = KM.inkluderaMoms ? (1 + KM.momsSats/100) : 1;
  const butikExkl = KM.butikPris / momsMulti;
  const momsKr = KM.butikPris - butikExkl;
  const margKr = butikExkl - KM.smoInpris;
  const margPct = butikExkl > 0 ? (margKr / butikExkl * 100) : 0;
  const margPctInkl = KM.butikPris > 0 ? (margKr / KM.butikPris * 100) : 0;
  const perDag = margKr * KM.kopparPerDag;
  const perPeriod = perDag * KM.dagar;
  const pos = margKr > 0;
  const col = pos ? '#2d7a4f' : '#dc2626';

  let h = '<div class="card" style="margin-top:16px">';

  // KPI strip - the key numbers
  h += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">';
  h += kpiHtml('Inpris (från er)', fmtKr(KM.smoInpris), 'exkl. moms');
  h += kpiHtml('Utpris (till kund)', fmtKr(KM.butikPris), 'inkl. moms');
  h += kpiHtml('Marginal kr/kopp', (pos?'+':'')+fmtKr(margKr), 'exkl. moms', pos);
  h += kpiHtml('Marginal %', margPct.toFixed(1)+'%', 'exkl. moms ('+margPctInkl.toFixed(1)+'% inkl.)', pos);
  h += '</div>';

  // Period table
  h += '<table class="km-result-table">';
  h += '<tr class="section"><td colspan="2">PER KOPP</td></tr>';
  h += '<tr><td>Butikens utpris inkl. moms</td><td>'+fmtKr(KM.butikPris)+'</td></tr>';
  if (KM.inkluderaMoms) {
    h += '<tr><td>Varav moms ('+KM.momsSats+'%)</td><td style="color:#6b7280">–'+fmtKr(momsKr)+'</td></tr>';
    h += '<tr><td>Utpris exkl. moms</td><td>'+fmtKr(butikExkl)+'</td></tr>';
  }
  h += '<tr><td>Inpris från er</td><td style="color:#dc2626">–'+fmtKr(KM.smoInpris)+'</td></tr>';
  h += '<tr class="highlight"><td>Marginal per kopp inkl. moms</td><td style="color:'+col+'">'+(pos?'+':'')+fmtKr(margKr)+'</td></tr>';
  h += '<tr class="highlight"><td>Marginal % inkl. moms</td><td style="color:'+col+'">'+margPctInkl.toFixed(1)+'%</td></tr>';

  h += '<tr class="section"><td colspan="2">PERIODVIS ('+KM.kopparPerDag+' koppar/dag)</td></tr>';
  h += '<tr><td>Per dag</td><td style="color:'+col+';font-weight:700">'+(pos?'+':'')+fmtKr(perDag)+'</td></tr>';
  h += '<tr><td>Per vecka (7 dagar)</td><td style="color:'+col+';font-weight:700">'+(pos?'+':'')+fmtKr(perDag*7)+'</td></tr>';
  h += '<tr><td>Per månad (30 dagar)</td><td style="color:'+col+';font-weight:700">'+(pos?'+':'')+fmtKr(perDag*30)+'</td></tr>';
  h += '<tr class="highlight"><td>'+KM.dagar+' dagar (valt period)</td><td style="color:'+col+'">'+(pos?'+':'')+fmtKr(perPeriod)+'</td></tr>';

  h += '</table>';

  // Pitch box
  h += '<div style="margin-top:16px;padding:14px 16px;background:#2d7a4f;border-radius:12px;color:white;font-size:13px;line-height:1.8">';
  h += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;opacity:0.8;margin-bottom:8px">💬 Säljargument</div>';
  h += 'Ni köper för <strong>'+fmtKr(KM.smoInpris)+'</strong> och säljer för <strong>'+fmtKr(KM.butikPris)+'</strong> – ';
  h += 'det ger <strong>'+margPctInkl.toFixed(1)+'%</strong> marginal och <strong>'+(pos?'+':'')+fmtKr(margKr)+'/kopp</strong>. ';
  h += 'Vid '+KM.kopparPerDag+' koppar/dag tjänar ni <strong>'+fmtKr(perDag)+'/dag</strong> och <strong>'+fmtKr(perPeriod)+' på '+KM.dagar+' dagar</strong>. ';
  h += 'Utan investering i utrustning – maskinen är inkluderad.';
  h += '</div>';

  h += '</div>';
  el.innerHTML = h;
}
