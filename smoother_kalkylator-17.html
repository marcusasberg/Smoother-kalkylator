<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; min-height: 100vh; padding: 24px 16px; color: #111827; }
:root { --g:#2d7a4f; --gl:#e8f5ee; --gb:#d1fae5; --r:#dc2626; --rl:#fef2f2; --b:#1d4ed8; --bl:#eff6ff; --gray:#6b7280; --dark:#111827; }
.wrap { max-width: 860px; margin: 0 auto; }
.card { background: white; border-radius: 14px; padding: 20px; border: 1px solid var(--gb); margin-bottom: 16px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
h1 { font-size: 26px; font-weight: 800; line-height: 1.2; }
h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
.sub { font-size: 12px; color: var(--gray); margin-bottom: 16px; }

/* Slider + input combo */
.sl { margin-bottom: 18px; }
.sl-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
.sl-lbl { font-size: 13px; color: var(--gray); font-weight: 500; flex: 1; }
.sl-input { width: 90px; font-size: 13px; font-weight: 700; color: var(--g); background: var(--gl); border: 1px solid var(--gb); border-radius: 7px; padding: 3px 8px; text-align: right; font-family: inherit; outline: none; transition: border-color .15s; -moz-appearance: textfield; }
.sl-input::-webkit-inner-spin-button, .sl-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.sl-input:focus { border-color: var(--g); background: white; }
.sl-mm { display: flex; justify-content: space-between; margin-top: 3px; font-size: 11px; color: #9ca3af; }
input[type=range] { -webkit-appearance:none; width:100%; height:4px; border-radius:2px; background:var(--gb); cursor:pointer; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--g); cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.2); }
input[type=range]::-moz-range-thumb { width:18px; height:18px; border-radius:50%; background:var(--g); cursor:pointer; border:none; }

/* KPI */
.kpi { border-radius: 12px; padding: 14px 16px; flex: 1; min-width: 110px; border: 1px solid var(--gb); background: white; }
.kpi.hl { background: var(--g); border-color: var(--g); }
.kpi.hlr { background: var(--r); border-color: var(--r); }
.kpi-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; color: var(--gray); }
.kpi.hl .kpi-lbl, .kpi.hlr .kpi-lbl { color: rgba(255,255,255,.75); }
.kpi-val { font-size: 20px; font-weight: 800; line-height: 1; color: var(--dark); }
.kpi.hl .kpi-val, .kpi.hlr .kpi-val { color: white; }
.kpi-sub { font-size: 11px; color: #9ca3af; margin-top: 4px; }
.kpi.hl .kpi-sub, .kpi.hlr .kpi-sub { color: rgba(255,255,255,.7); }

/* Model cards */
.mcards { display: flex; gap: 10px; flex-wrap: wrap; }
.mc { flex:1; min-width:140px; background:white; border:2px solid #e5e7eb; border-radius:10px; padding:10px 12px; cursor:pointer; text-align:left; }
.mc.sel { background:var(--gl); border-color:var(--g); }
.mc-t { font-size:12px; font-weight:700; color:var(--dark); margin-bottom:3px; }
.mc.sel .mc-t { color:var(--g); }
.mc-d { font-size:11px; color:var(--gray); line-height:1.4; }

/* PL */
.plr { display:flex; justify-content:space-between; align-items:center; padding:4px 0; }
.plr.ind { padding-left:16px; }
.pl-l { font-size:13px; color:var(--gray); }
.plr.bold .pl-l { color:var(--dark); font-weight:700; }
.pl-v { font-size:13px; font-weight:500; color:var(--dark); }
.plr.bold .pl-v { font-weight:700; }
.plr.pos .pl-v { color:var(--g); }
.plr.neg .pl-v { color:var(--r); }
.pl-sep { border-top:1px solid var(--gb); margin:6px 0; }

/* Result box */
.rbox { border-radius:12px; padding:16px; text-align:center; }
.rbox-lbl { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
.rbox-val { font-size:28px; font-weight:800; }
.rbox-sub { font-size:12px; margin-top:6px; opacity:.8; }

/* Extra posts */
.ep { display:flex; justify-content:space-between; align-items:center; background:#f9fafb; border-radius:8px; padding:8px 12px; margin-bottom:6px; }
.ep-nm { font-size:13px; }
.ep-amt { font-size:13px; font-weight:600; color:var(--r); }
.ep-rm { background:none; border:none; cursor:pointer; color:#9ca3af; font-size:20px; line-height:1; padding:0 4px; }
.add-row { display:flex; gap:8px; margin-top:8px; }
.add-row input { border:1px solid var(--gb); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; outline:none; }
.add-row input:focus { border-color:var(--g); }
.add-row .ni { flex:2; } .add-row .ai { flex:1; }
.add-btn { background:var(--g); color:white; border:none; border-radius:8px; padding:8px 16px; font-size:14px; font-weight:700; cursor:pointer; }

/* Info boxes */
.ibox { background:#f9fafb; border-radius:8px; padding:10px 14px; font-size:12px; color:var(--gray); margin-top:14px; }
.gbox { background:var(--gl); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--g); font-weight:500; margin-top:12px; }
.scol-t { font-size:12px; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }

/* Scale */
.scards { display:flex; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
.sc { flex:1; min-width:140px; border-radius:10px; padding:14px 16px; }
.sc-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.sc-val { font-size:20px; font-weight:800; }
.sc-sub { font-size:11px; margin-top:4px; opacity:.8; }
.sc-g { background:var(--gl); color:var(--g); }
.sc-r { background:var(--rl); border:1px solid #fecaca; color:var(--r); }
.sc-b { background:var(--bl); border:1px solid #bfdbfe; color:var(--b); }
.chart-bars { display:flex; align-items:flex-end; gap:2px; height:200px; padding:0 4px; }
.bgrp { display:flex; gap:1px; align-items:flex-end; flex:1; }
.bar { border-radius:3px 3px 0 0; min-width:4px; }
.chart-legend { display:flex; gap:16px; justify-content:center; margin-top:10px; }
.leg { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--gray); }
.leg-dot { width:12px; height:12px; border-radius:2px; }
.chart-x { display:flex; justify-content:space-between; padding:4px 4px 0; font-size:10px; color:#9ca3af; }
.scale-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
select { font-size:12px; padding:4px 8px; border-radius:6px; border:1px solid var(--gb); color:var(--dark); background:white; font-family:inherit; cursor:pointer; }
.insight { background:var(--g); border-radius:14px; padding:18px 20px; color:white; }
.ins-t { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; opacity:.8; }
.ins-b { font-size:14px; line-height:1.7; }
.ins-obs { margin-top:12px; padding:10px 14px; background:rgba(255,255,255,.15); border-radius:8px; font-size:13px; font-weight:600; }
.flex{display:flex;} .fcol{display:flex;flex-direction:column;}
.gap8{gap:8px;} .gap10{gap:10px;} .gap12{gap:12px;} .gap16{gap:16px;} .gap24{gap:24px;}
@media(max-width:600px){ .grid2{grid-template-columns:1fr;} }

/* Login screen */
#login-screen {
  position: fixed; inset: 0;
  background: #f9fafb;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-box {
  background: white;
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 360px;
  border: 1px solid #d1fae5;
  text-align: center;
}
.login-logo { margin-bottom: 28px; }
.login-logo img { height: 44px; width: auto; }
.login-title { font-size: 15px; font-weight: 600; color: #6b7280; margin-bottom: 28px; letter-spacing: 0.02em; }
.login-field {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #d1fae5;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  margin-bottom: 12px;
  color: #111827;
  background: #f9fafb;
  transition: border-color .15s, background .15s;
}
.login-field:focus { border-color: #2d7a4f; background: white; }
.login-btn {
  width: 100%;
  padding: 13px;
  background: #2d7a4f;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 4px;
  transition: background .15s;
}
.login-btn:hover { background: #245f3e; }
.login-btn:active { background: #1d4f34; }
.login-error {
  color: #dc2626;
  font-size: 13px;
  margin-top: 10px;
  min-height: 18px;
}


/* Export buttons */
.export-section { margin-top: 16px; }
.export-row { display: flex; gap: 12px; flex-wrap: wrap; }
.export-btn {
  flex: 1; min-width: 140px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 20px;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: opacity .15s;
}
.export-btn:hover { opacity: 0.85; }
.export-btn:active { opacity: 0.7; }
.btn-pdf { background: #dc2626; color: white; }
.btn-excel { background: #166534; color: white; }
.export-icon { font-size: 18px; }
@media print {
  #login-screen, .export-section, .scale-hdr select { display: none !important; }
  body { padding: 0; background: white; }
  .card { border: 1px solid #e5e7eb; break-inside: avoid; }
  .insight { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .kpi.hl { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

</style>
</head>

const S={
  koppar:15, aktivaKunder:1, pris:30, kostnad:13,
  maskinpris:50000, modell:'lan',
  leasingPerMan:800, koppprispaslag:2, maxKunder:100,
  fastKostnad:5000, extraPoster:[],
  nyNamn:'', nyBelopp:''
};

const fmtKr=v=>Math.round(v).toLocaleString('sv-SE')+' kr';
const fmtN=v=>Number(v).toLocaleString('sv-SE');
const fmtD=v=>v<30?Math.round(v)+' dgr':(v/30).toFixed(1)+' mån';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Slider configs: [min, max, step]
const SLCFG={
  koppar:[3,50,1], aktivaKunder:[1,200,1], pris:[15,60,1], kostnad:[5,30,1],
  maskinpris:[10000,150000,1000], leasingPerMan:[200,3000,100],
  koppprispaslag:[1,10,0.5], fastKostnad:[0,250000,500]
};

function calc(){
  // Marginal per kopp (pris - råvara). Påslag påverkar INTE mp – det är intern bokföring.
  const mp = S.pris - S.kostnad;

  // Omsättning: koppar × pris × kunder × 30 dagar
  const oms = S.koppar * S.pris * S.aktivaKunder * 30;

  // Råvarukostnad
  const ror = S.koppar * S.kostnad * S.aktivaKunder * 30;

  // Övriga kostnader
  const sumX = S.extraPoster.reduce((a,p) => a + p.belopp, 0);
  const fast = S.fastKostnad + sumX;

  // Leasing = intäkt för oss
  const leasIntakt = S.modell === 'leasing' ? S.leasingPerMan * S.aktivaKunder : 0;
  const omsTotal = oms + leasIntakt;

  // Bruttomarginal = (pris - råvara) × koppar × kunder × 30 + eventuell leasingintäkt
  const bru = mp * S.koppar * 30 * S.aktivaKunder + leasIntakt;

  // Totala kostnader (råvara + övriga – leasing är intäkt inte kostnad)
  const tot = ror + fast;

  // Resultat
  const res = omsTotal - tot;
  const marg = omsTotal > 0 ? ((res / omsTotal) * 100).toFixed(1) : '0.0';

  // Återbetalningstid per maskin (i dagar):
  // Lan:    marginal per dag = mp * koppar
  // Leasing: marginal per dag = mp * koppar + leasingPerMan/30
  // Påslag: marginal per dag = (mp + påslag) * koppar  ← påslaget adderas till marginalen
  const margPerDag = S.modell === 'leasing'
    ? mp * S.koppar + S.leasingPerMan / 30
    : S.modell === 'paslag'
    ? (mp + S.koppprispaslag) * S.koppar
    : mp * S.koppar;

  const atbD = S.maskinpris / margPerDag;

  return {mp, oms, omsTotal, leasIntakt, ror, fast, bru, tot, res, marg, atbD, atbM:(atbD/30).toFixed(1)};
}

// Called when slider moves
function sliderChange(key, val) {
  val = Number(val);
  S[key] = val;
  // Sync the number input
  const ni = document.getElementById('ni_'+key);
  if (ni) ni.value = val;
  updateDerived();
}

// Called when number input changes
function numInput(key, val) {
  const cfg = SLCFG[key];
  let v = parseFloat(val);
  if (isNaN(v)) return;
  v = Math.max(cfg[0], Math.min(cfg[1], v));
  S[key] = v;
  // Sync the slider
  const sl = document.getElementById('sl_'+key);
  if (sl) sl.value = v;
  // Sync number input (in case value was clamped)
  const ni = document.getElementById('ni_'+key);
  if (ni && parseFloat(ni.value) !== v) ni.value = v;
  updateDerived();
}

function setText(id,t){ const e=document.getElementById(id); if(e) e.textContent=t; }
function setClass(id,c){ const e=document.getElementById(id); if(e) e.className=c; }

function updateDerived(){
  const c=calc();
  const resPos=c.res>=0;

  setText('kv_oms', fmtKr(c.omsTotal));
  setText('ks_oms', S.aktivaKunder+' kund × '+S.koppar+' koppar × '+S.pris+' kr × 30d'+(c.leasIntakt>0?' + leasing':''));
  setText('kv_ror', fmtKr(c.ror));
  setText('ks_ror', S.kostnad+' kr/kopp');
  setText('kv_bru', fmtKr(c.bru));
  setText('ks_bru', c.mp+' kr/kopp');
  // Marginalanalys
  setText('km_kopp', fmtKr(c.mp));
  setText('km_kopp_s', S.pris+' kr – '+S.kostnad+' kr råvara');
  setText('km_tg', (S.pris>0?Math.round(c.mp/S.pris*100):0)+'%');
  setText('km_dag', fmtKr(c.mp*S.koppar));
  setText('km_dag_s', c.mp+' kr × '+S.koppar+' koppar');
  setText('km_man', fmtKr(c.mp*S.koppar*30*S.aktivaKunder));
  setText('km_man_s', S.aktivaKunder+' kund(er) × 30 dagar');
  setText('pl_oms', fmtKr(c.omsTotal));
  setText('pl_ror', '–'+fmtKr(c.ror));
  setText('pl_ror_lbl','Råvara ('+S.kostnad+' kr × '+S.koppar+' kp × '+S.aktivaKunder+' kund × 30d)');
  setText('pl_leas','+'+fmtKr(S.leasingPerMan*S.aktivaKunder));
  setText('pl_bru', fmtKr(c.bru));
  setClass('pl_bru_row','plr bold '+(c.bru>0?'pos':c.bru<0?'neg':''));
  setText('pl_fast','–'+fmtKr(S.fastKostnad));
  setText('pl_res', fmtKr(c.res));
  setClass('pl_res_row','plr bold '+(c.res>0?'pos':c.res<0?'neg':''));

  const rcolor=resPos?'#2d7a4f':'#dc2626';
  const rbg=resPos?'#e8f5ee':'#fef2f2';
  const rbox=document.getElementById('rbox');
  if(rbox){rbox.style.background=rbg;rbox.style.borderColor=rcolor;}
  ['rbox_lbl','rbox_val','rbox_sub'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.color=rcolor;});
  setText('rbox_val', fmtKr(c.res));
  setText('rbox_sub','Rörelsemarginal: '+c.marg+'%');
  setText('kv_ar', fmtKr(c.res*12));
  setText('kv_oms_ar', fmtKr(c.omsTotal*12));
  setText('ks_oms_ar', S.aktivaKunder+' kund(er)');
  setText('kv_tot', fmtKr(c.tot));
  const arEl=document.getElementById('kpi_ar');
  if(arEl) arEl.className='kpi '+(c.res>0?'hl':'');
  setText('atb_txt', fmtD(c.atbD)+' vid '+S.koppar+' koppar/dag');
  setText('atb_leas_txt','Återbetalningstid med leasing: '+c.atbM+' månader — leasingen bidrar med '+fmtKr(S.leasingPerMan/30)+'/dag extra');
  const atbUtan=(S.maskinpris/(c.mp*S.koppar)/30).toFixed(1);
  const atbMed=parseFloat(c.atbM);
  const snabbare=(parseFloat(atbUtan)-atbMed).toFixed(1);
  setText('atb_pasl_txt','Med '+S.koppprispaslag+' kr påslag/kopp återbetalas maskinen på '+c.atbM+' mån — '+snabbare+' mån snabbare än utan påslag ('+atbUtan+' mån).');
  setText('sc_oms_val', fmtKr(S.pris*S.koppar*30*S.maxKunder+(S.modell==='leasing'?S.leasingPerMan*S.maxKunder:0)));
  setText('sc_kost_val', fmtKr(S.kostnad*S.koppar*30*S.maxKunder+c.fast));
  setText('sc_res_val', fmtKr((S.pris-S.kostnad)*S.koppar*30*S.maxKunder+(S.modell==='leasing'?S.leasingPerMan*S.maxKunder:0)-c.fast));
  setText('sc_oms_lbl','Omsättning vid '+S.maxKunder+' kunder');
  setText('sc_kost_lbl','Total kostnad vid '+S.maxKunder+' kunder');
  setText('sc_res_lbl','Resultat vid '+S.maxKunder+' kunder');
  setText('ins_txt','Med '+S.aktivaKunder+' aktiva kunder och '+S.koppar+' koppar/dag omsätter vi '+fmtKr(c.omsTotal)+'/mån mot totala kostnader på '+fmtKr(c.tot)+'/mån — vilket ger ett månadsresultat på '+fmtKr(c.res)+' ('+c.marg+'% rörelsemarginal). Maskinen återbetalas på '+c.atbM+' månader per kund.');
  setText('ins_obs','Obs: Kapitalbehov för '+S.aktivaKunder+' maskiner just nu: '+fmtKr(S.maskinpris*S.aktivaKunder)+' — planera finansiering i god tid innan vi skalar upp.');
  renderChart(c.fast);
}

function renderChart(fast){
  const el=document.getElementById('chart');
  if(!el) return;
  const data=[];
  for(let k=1;k<=S.maxKunder;k+=Math.max(1,Math.floor(S.maxKunder/20))){
    data.push({k,oms:S.pris*S.koppar*30*k+(S.modell==='leasing'?S.leasingPerMan*k:0),kost:S.kostnad*S.koppar*30*k+fast});
  }
  const maxV=Math.max(...data.map(d=>Math.max(d.oms,d.kost)))*1.05;
  const H=200;
  let bars='';
  data.forEach(d=>{
    const ho=Math.round((d.oms/maxV)*H);
    const hk=Math.round((d.kost/maxV)*H);
    bars+=`<div class="bgrp"><div class="bar" style="height:${ho}px;background:#2d7a4f;opacity:.85;flex:1" title="${d.k} kunder – Omsättning: ${fmtKr(d.oms)}"></div><div class="bar" style="height:${hk}px;background:#dc2626;opacity:.75;flex:1" title="${d.k} kunder – Kostnader: ${fmtKr(d.kost)}"></div></div>`;
  });
  const xs=data.filter((_,i)=>i===0||i===Math.floor(data.length/2)||i===data.length-1).map(d=>d.k);
  el.innerHTML=`<div class="chart-bars">${bars}</div><div class="chart-x">${xs.map(k=>`<span>${k}</span>`).join('')}</div>`;
}

function sl(key, label, value, unit) {
  const cfg = SLCFG[key];
  return `<div class="sl">
    <div class="sl-top">
      <span class="sl-lbl">${label}</span>
      <input class="sl-input" id="ni_${key}" type="number" value="${+value}" min="${cfg[0]}" max="${cfg[1]}" step="${cfg[2]}"
        oninput="numInput('${key}',this.value)"
        onblur="this.value=(+S['${key}'])">
    </div>
    <input type="range" id="sl_${key}" min="${cfg[0]}" max="${cfg[1]}" step="${cfg[2]}" value="${+value}"
      oninput="sliderChange('${key}',this.value)">
    <div class="sl-mm"><span>${fmtN(cfg[0])} ${unit}</span><span>${fmtN(cfg[1])} ${unit}</span></div>
  </div>`;
}

function setMod(m){ S.modell=m; render(); }
function addPost(){ const n=S.nyNamn.trim(),b=+S.nyBelopp; if(n&&b>0){S.extraPoster.push({namn:n,belopp:b});S.nyNamn='';S.nyBelopp='';render();} }
function rmPost(i){ S.extraPoster.splice(i,1); render(); }

      <div class="kpi hl" style="min-width:130px"><div class="kpi-lbl">TB / mån (alla kunder)</div><div class="kpi-val" id="km_man">${fmtKr(c.mp*S.koppar*30*S.aktivaKunder)}</div><div class="kpi-sub" id="km_man_s">${S.aktivaKunder} kund(er) × 30 dagar</div></div>

  <div class="card">
    <h2 style="margin-bottom:4px">Övriga kostnader / mån</h2>

    <div class="ibox">Återbetalningstid (per maskin): <strong style="color:#2d7a4f" id="atb_txt">${fmtD(c.atbD)} vid ${S.koppar} koppar/dag</strong></div>

  <div class="card">

    <div class="grid2 gap24">

        <div class="plr bold pos"><span class="pl-l">Omsättning</span><span class="pl-v" id="pl_oms">${fmtKr(c.omsTotal)}</span></div>

        ${S.modell==='leasing'?`<div class="plr ind pos"><span class="pl-l">Leasingintäkt (${S.aktivaKunder} maskiner × ${fmtKr(S.leasingPerMan)}/mån)</span><span class="pl-v" id="pl_leas">+${fmtKr(S.leasingPerMan*S.aktivaKunder)}</span></div>`:''}
        <div class="pl-sep"></div>
        <div class="plr bold ${c.bru>0?'pos':c.bru<0?'neg':''}" id="pl_bru_row"><span class="pl-l">Bruttoresultat</span><span class="pl-v" id="pl_bru">${fmtKr(c.bru)}</span></div>
        <div class="pl-sep"></div>
        <div class="plr bold"><span class="pl-l">Övriga kostnader</span><span class="pl-v"></span></div>
        <div class="plr ind neg"><span class="pl-l">Fasta (hyra, lön, abonnemang)</span><span class="pl-v" id="pl_fast">–${fmtKr(S.fastKostnad)}</span></div>
        ${S.extraPoster.map(p=>`<div class="plr ind neg"><span class="pl-l">${esc(p.namn)}</span><span class="pl-v">–${fmtKr(p.belopp)}</span></div>`).join('')}
        <div class="pl-sep"></div>
        <div class="plr bold ${c.res>0?'pos':c.res<0?'neg':''}" id="pl_res_row"><span class="pl-l">Rörelseresultat (EBIT)</span><span class="pl-v" id="pl_res">${fmtKr(c.res)}</span></div>

      <div class="fcol gap10">
        <div class="rbox" id="rbox" style="background:${rbg};border:1px solid ${rcolor}">
          <div class="rbox-lbl" id="rbox_lbl" style="color:${rcolor}">Månadsresultat</div>
          <div class="rbox-val" id="rbox_val" style="color:${rcolor}">${fmtKr(c.res)}</div>
          <div class="rbox-sub" id="rbox_sub" style="color:${rcolor}">Rörelsemarginal: ${c.marg}%</div>
        </div>
        <div class="kpi ${c.res>0?'hl':''}" id="kpi_ar"><div class="kpi-lbl">Årsresultat</div><div class="kpi-val" id="kv_ar">${fmtKr(c.res*12)}</div><div class="kpi-sub">= månadsresultat × 12</div></div>
        <div class="kpi"><div class="kpi-lbl">Total omsättning/år</div><div class="kpi-val" id="kv_oms_ar">${fmtKr(c.omsTotal*12)}</div><div class="kpi-sub" id="ks_oms_ar">${S.aktivaKunder} kund(er)</div></div>
        <div class="kpi"><div class="kpi-lbl">Totala kostnader/mån</div><div class="kpi-val" id="kv_tot">${fmtKr(c.tot)}</div><div class="kpi-sub">Rörligt + Övriga</div></div>

          ${[25,50,100,200].map(v=>`<option value="${v}"${S.maxKunder===v?' selected':''}>${v} kunder</option>`).join('')}

      <div class="sc sc-r"><div class="sc-lbl" id="sc_kost_lbl">Total kostnad vid ${S.maxKunder} kunder</div><div class="sc-val" id="sc_kost_val">${fmtKr(S.kostnad*S.koppar*30*S.maxKunder+c.fast)}</div><div class="sc-sub">per månad</div></div>
      <div class="sc sc-b"><div class="sc-lbl" id="sc_res_lbl">Resultat vid ${S.maxKunder} kunder</div><div class="sc-val" id="sc_res_val">${fmtKr((S.pris-S.kostnad)*S.koppar*30*S.maxKunder+(S.modell==='leasing'?S.leasingPerMan*S.maxKunder:0)-c.fast)}</div><div class="sc-sub">per månad</div></div>

    <div class="ins-obs" id="ins_obs">Obs: Kapitalbehov för ${S.aktivaKunder} maskiner just nu: ${fmtKr(S.maskinpris*S.aktivaKunder)} — planera finansiering i god tid innan vi skalar upp.</div>
  </div>

  <div class="card export-section">
    <h2 style="margin-bottom:14px">Exportera</h2>
    <div class="export-row">
      <button class="export-btn btn-pdf" onclick="exportPDF()">

      </button>
      <button class="export-btn btn-excel" onclick="exportExcel()">
        <span class="export-icon">📊</span> Exportera som Excel
      </button>

  `;

  renderChart(c.fast);
}


// ── export ────────────────────────────────────────────────────────────────────
function exportPDF() {
  const c = calc();
  const resPos = c.res >= 0;
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  script.onload = function() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const G=[45,122,79], R=[220,38,38], D=[17,24,39], GR=[107,114,128];
    const GL=[233,245,238], RL=[254,242,242], BL=[239,246,255];
    const W=210, ML=14, MR=14, CW=W-ML-MR;
    const fmtK=v=>Math.round(v).toLocaleString('sv-SE')+' kr';
    const fmtD=v=>v<30?Math.round(v)+' dgr':(v/30).toFixed(1)+' mån';
    const today=new Date().toLocaleDateString('sv-SE');

    // ── HEADER ──────────────────────────────────────────────────────────
    doc.setFillColor(...G);
    doc.rect(0,0,W,24,'F');
    const logoW=58, logoH=58/3.871;
    doc.setFillColor(249,246,241);
    doc.roundedRect(ML,3,logoW+2,logoH+2,1,1,'F');
    doc.addImage(L,'PNG',ML+1,4,logoW,logoH);
    doc.setTextColor(255,255,255);
    doc.setFontSize(13); doc.setFont('helvetica','bold');
    doc.text('Affärsmodellkalkylator',W-MR,12,{align:'right'});
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text(today,W-MR,19,{align:'right'});
    let y=28;

    // ── helpers ──────────────────────────────────────────────────────────
    function secBar(t) {
      doc.setFillColor(...G);
      doc.rect(ML,y,CW,5.5,'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(7); doc.setFont('helvetica','bold');
      doc.text(t.toUpperCase(),ML+2,y+4);
      y+=7;
    }

    // Single full-width row: label left, value right
    function row(lbl,val,bold,col,indent) {
      doc.setFontSize(8);
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.setTextColor(...(col||D));
      const x=ML+(indent?4:0);
      const maxW=CW*0.65;
      doc.text(lbl,x,y,{maxWidth:maxW});
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.text(String(val),W-MR,y,{align:'right'});
      y+=5;
    }

    function sep() {
      doc.setDrawColor(209,250,229);
      doc.line(ML,y-1,W-MR,y-1);
      y+=1;
    }

    function kpiRow(items) {
      // items: [{lbl, val, sub, hl}]
      const n=items.length;
      const bw=(CW-(n-1)*4)/n;
      items.forEach((it,i)=>{
        const x=ML+i*(bw+4);
        const bh=18;
        if(it.hl){
          doc.setFillColor(...G);
        } else if(it.red){
          doc.setFillColor(...R);
        } else {
          doc.setFillColor(249,250,251);
        }
        doc.roundedRect(x,y,bw,bh,1.5,1.5,'F');
        const tc=it.hl||it.red?[255,255,255]:GR;
        const vc=it.hl||it.red?[255,255,255]:D;
        doc.setFontSize(6); doc.setFont('helvetica','bold'); doc.setTextColor(...tc);
        doc.text(it.lbl.toUpperCase(),x+2,y+5);
        doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...vc);
        doc.text(it.val,x+2,y+12);
        if(it.sub){ doc.setFontSize(6); doc.setFont('helvetica','normal'); doc.setTextColor(...(it.hl||it.red?[200,235,215]:GR)); doc.text(it.sub,x+2,y+17); }
      });
      y+=22;
    }

    // ── MARGINALANALYS ────────────────────────────────────────────────────
    secBar('Marginalanalys per kopp');
    kpiRow([
      {lbl:'Marginal / kopp', val:fmtK(c.mp), sub:S.pris+' kr – '+S.kostnad+' kr råvara'},
      {lbl:'Täckningsgrad', val:(S.pris>0?Math.round(c.mp/S.pris*100):0)+'%', sub:'Marginal ÷ pris'},
      {lbl:'TB / dag (per kund)', val:fmtK(c.mp*S.koppar), sub:c.mp+' kr × '+S.koppar+' koppar'},
      {lbl:'TB / mån (alla kunder)', val:fmtK(c.mp*S.koppar*30*S.aktivaKunder), sub:S.aktivaKunder+' kund(er) × 30d', hl:true},
    ]);

    // ── TWO COLUMNS: Parametrar + Resultaträkning ─────────────────────────
    const colW=(CW-6)/2;
    const c2x=ML+colW+6;
    const colStartY=y;

    // LEFT: Parametrar
    doc.setFillColor(...G); doc.rect(ML,y,colW,5.5,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('PARAMETRAR',ML+2,y+4);
    y+=7;

    function prow(lbl,val) {
      doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(...GR);
      doc.text(lbl,ML,y);
      doc.setFont('helvetica','bold'); doc.setTextColor(...D);
      doc.text(String(val),ML+colW,y,{align:'right'});
      y+=4.8;
    }
    prow('Koppar/dag (per kund)',S.koppar+' st');
    prow('Aktiva kunder',S.aktivaKunder+' st');
    prow('Pris till butik/kopp',S.pris+' kr');
    prow('Råvarukostnad/kopp',S.kostnad+' kr');
    prow('Fasta månadskostnader',fmtK(S.fastKostnad));
    prow('Maskinpris/maskin',fmtK(S.maskinpris));
    const modTxt=S.modell==='lan'?'Äger & lånar ut':S.modell==='leasing'?'Butiken leasar':'Påslag/kopp';
    prow('Affärsmodell',modTxt);
    if(S.modell==='leasing') prow('Leasingavgift/kund/mån',fmtK(S.leasingPerMan));
    if(S.modell==='paslag') prow('Påslag per kopp',S.koppprispaslag+' kr');
    if(S.extraPoster.length>0){
      doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(...GR);
      doc.text('Övriga rörliga:',ML,y); y+=4.8;
      S.extraPoster.forEach(p=>prow('  '+p.namn,fmtK(p.belopp)));
    }
    const leftEndY=y;

    // RIGHT: Resultaträkning
    y=colStartY;
    doc.setFillColor(...G); doc.rect(c2x,y,colW,5.5,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('RESULTATRÄKNING / MÅN',c2x+2,y+4);
    y+=7;

    function rrow(lbl,val,bold,col) {
      doc.setFontSize(7.5);
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.setTextColor(...(col||D));
      doc.text(lbl,c2x,y,{maxWidth:colW*0.62});
      doc.setFont('helvetica',bold?'bold':'normal');
      doc.text(String(val),c2x+colW,y,{align:'right'});
      y+=4.8;
    }
    function rsep(){ doc.setDrawColor(209,250,229); doc.line(c2x,y-1,c2x+colW,y-1); y+=1.5; }

    rrow('Omsättning',fmtK(c.omsTotal),true,G);
    if(S.modell==='leasing') rrow('  Leasingintäkt','+'+fmtK(c.leasIntakt),false,G);
    rsep();
    rrow('Råvarukostnad','–'+fmtK(c.ror),false,R);
    rsep();
    rrow('Bruttoresultat',fmtK(c.bru),true,c.bru>=0?G:R);
    rsep();
    rrow('Fasta kostnader','–'+fmtK(S.fastKostnad),false,R);
    S.extraPoster.forEach(p=>rrow('  '+p.namn,'–'+fmtK(p.belopp),false,R));
    rsep();
    rrow('Rörelseresultat (EBIT)',fmtK(c.res),true,c.res>=0?G:R);
    const rightEndY=y;

    y=Math.max(leftEndY,rightEndY)+4;

    // ── RESULTATBOX ───────────────────────────────────────────────────────
    const bc=resPos?G:R;
    doc.setFillColor(...bc);
    doc.roundedRect(ML,y,CW,16,2,2,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text('MÅNADSRESULTAT',W/2,y+5,{align:'center'});
    doc.setFontSize(14); doc.setFont('helvetica','bold');
    doc.text(fmtK(c.res),W/2,y+12,{align:'center'});
    doc.setFontSize(7.5); doc.setFont('helvetica','normal');
    doc.text('Rörelsemarginal: '+c.marg+'%',W/2,y+17,{align:'center'});
    y+=21;

    // ── KPI STRIP ─────────────────────────────────────────────────────────
    kpiRow([
      {lbl:'Årsresultat', val:fmtK(c.res*12), sub:'månadsresultat × 12', hl:c.res>0, red:c.res<0},
      {lbl:'Omsättning / år', val:fmtK(c.omsTotal*12), sub:S.aktivaKunder+' kund(er)'},
      {lbl:'Totala kostnader/mån', val:fmtK(c.tot), sub:'Rörligt + Övriga'},
    ]);

    // ── SKALBARHET & MASKIN ───────────────────────────────────────────────
    secBar('Skalbarhet (vid '+S.maxKunder+' kunder) & maskin');
    const scOms=S.pris*S.koppar*30*S.maxKunder+(S.modell==='leasing'?S.leasingPerMan*S.maxKunder:0);
    const scKost=S.kostnad*S.koppar*30*S.maxKunder+c.fast;
    const scRes=scOms-scKost;
    kpiRow([
      {lbl:'Omsättning/mån', val:fmtK(scOms), sub:'vid '+S.maxKunder+' kunder'},
      {lbl:'Totala kostnader/mån', val:fmtK(scKost), sub:'vid '+S.maxKunder+' kunder'},
      {lbl:'Resultat/mån', val:fmtK(scRes), sub:'vid '+S.maxKunder+' kunder', hl:scRes>=0, red:scRes<0},
    ]);

    // Maskin row
    doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(...D);
    doc.text('Återbetalningstid/maskin:',ML,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(...G);
    doc.text(fmtD(c.atbD)+' vid '+S.koppar+' koppar/dag',ML+42,y);
    doc.setFont('helvetica','normal'); doc.setTextColor(...D);
    doc.text('Kapitalbehov ('+S.aktivaKunder+' maskiner):',c2x,y);
    doc.setFont('helvetica','bold'); doc.setTextColor(...R);
    doc.text(fmtK(S.maskinpris*S.aktivaKunder),W-MR,y,{align:'right'});
    y+=8;

    // ── FOOTER ───────────────────────────────────────────────────────────
    doc.setFillColor(249,250,251);
    doc.rect(0,286,W,11,'F');
    doc.setTextColor(...GR); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Smoother AB – Konfidentiellt',ML,292);
    doc.text('Genererad '+today,W-MR,292,{align:'right'});

    doc.save('Smoother_'+today.replace(/\//g,'-')+'.pdf');
  };
  script.onerror=function(){alert('Kunde inte ladda PDF-biblioteket. Kontrollera internetanslutningen.');};
  document.head.appendChild(script);
}

function exportExcel() {
  const c = calc();
  // Build CSV content (opens cleanly in Excel)
  const rows = [
    ['Smoother AB – Affärsmodellkalkylator', ''],
    ['', ''],
    ['PARAMETRAR', ''],
    ['Koppar per dag (per kund)', S.koppar],
    ['Aktiva kunder', S.aktivaKunder],
    ['Pris till butik per kopp (kr)', S.pris],
    ['Rörlig kostnad per kopp – råvara (kr)', S.kostnad],
    ['Fasta månadskostnader (kr)', S.fastKostnad],
    ['Maskinpris per maskin (kr)', S.maskinpris],
    ['Affärsmodell', S.modell === 'lan' ? 'Vi äger & lånar ut' : S.modell === 'leasing' ? 'Butiken leasar' : 'Påslag per kopp'],
  ];
  if (S.modell === 'leasing') rows.push(['Leasingavgift per kund/mån (kr)', S.leasingPerMan]);
  if (S.modell === 'paslag') rows.push(['Påslag per kopp för maskin (kr)', S.koppprispaslag]);
  if (S.extraPoster.length > 0) {
    rows.push(['', '']);
    rows.push(['ÖVRIGA RÖRLIGA KOSTNADER', '']);
    S.extraPoster.forEach(p => rows.push([p.namn, p.belopp]));
  }
  rows.push(['', '']);
  rows.push(['RESULTATRÄKNING / MÅN', '']);
  rows.push(['Omsättning (kr)', Math.round(c.omsTotal)]);
  if (S.modell === 'leasing') rows.push(['  varav leasingintäkt (kr)', Math.round(c.leasIntakt)]);
  rows.push(['Råvarukostnad (kr)', '-' + Math.round(c.ror)]);
  rows.push(['Bruttoresultat (kr)', Math.round(c.bru)]);
  rows.push(['Fasta kostnader (kr)', '-' + Math.round(S.fastKostnad)]);
  S.extraPoster.forEach(p => rows.push(['  ' + p.namn + ' (kr)', '-' + p.belopp]));
  rows.push(['Rörelseresultat / EBIT (kr)', Math.round(c.res)]);
  rows.push(['Rörelsemarginal (%)', c.marg]);
  rows.push(['', '']);
  rows.push(['NYCKELTAL', '']);
  rows.push(['Årsresultat (kr)', Math.round(c.res * 12)]);
  rows.push(['Total omsättning/år (kr)', Math.round(c.omsTotal * 12)]);
  rows.push(['Återbetalningstid per maskin', (c.atbD / 30).toFixed(1) + ' månader']);
  rows.push(['Kapitalbehov – ' + S.aktivaKunder + ' maskiner (kr)', Math.round(S.maskinpris * S.aktivaKunder)]);
  rows.push(['', '']);
  rows.push(['SKALBARHET (vid ' + S.maxKunder + ' kunder)', '']);
  rows.push(['Omsättning (kr)', Math.round(S.pris * S.koppar * 30 * S.maxKunder + (S.modell === 'leasing' ? S.leasingPerMan * S.maxKunder : 0))]);
  rows.push(['Total kostnad (kr)', Math.round(S.kostnad * S.koppar * 30 * S.maxKunder + c.fast)]);
  rows.push(['Resultat (kr)', Math.round((S.pris - S.kostnad) * S.koppar * 30 * S.maxKunder + (S.modell === 'leasing' ? S.leasingPerMan * S.maxKunder : 0) - c.fast)]);

  // Convert to CSV with BOM for Excel Swedish encoding
  const BOM = '\uFEFF';
  const csv = BOM + rows.map(r => r.map(v => {
    const s = String(v);
    return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g,'""') + '"' : s;
  }).join(';')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Smoother_kalkylator.csv';
  a.click();
  URL.revokeObjectURL(url);
}
